<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drafts — Scouthook</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

  <script src="/js/cached-fetch.js"></script>
  <script src="/js/sidebar.js"></script>

  <!-- ── Main content ──────────────────────────────────────── -->
  <div id="main-content">

    <!-- ── Publish banner ──────────────────────────────────── -->
    <div id="publish-banner" class="publish-banner hidden" role="status" aria-live="polite">
      Post successfully published to LinkedIn. Draft archived.
    </div>

    <!-- ── Drafts ───────────────────────────────────────────── -->
    <div class="drafts-page">
      <nav class="account-tabs" aria-label="Posts">
        <a href="/drafts.html" class="account-tab active" aria-current="page">Drafts</a>
        <a href="/schedule.html" class="account-tab">Scheduled</a>
        <a href="/published.html" class="account-tab">Published</a>
      </nav>

      <div class="drafts-header page-header">
        <div>
          <h1 class="drafts-title" id="drafts-title">Drafts</h1>
          <p class="drafts-sub">Your saved posts, newest first. Click any row to refine.</p>
        </div>
      </div>

      <div id="drafts-container" aria-live="polite">
        <div class="skeleton-pulse" aria-hidden="true" style="display:flex;flex-direction:column;gap:var(--space-3)">
          <div class="skeleton-draft-row">
            <div class="skeleton-draft-meta">
              <div class="skeleton-line" style="width:52px;height:12px;margin:0"></div>
              <div class="skeleton-badge" style="width:72px"></div>
            </div>
            <div class="skeleton-draft-hook"><div class="skeleton-line" style="width:75%;margin:0"></div></div>
            <div class="skeleton-line" style="width:15px;height:15px;margin:0;flex-shrink:0;border-radius:var(--radius-sm)"></div>
          </div>
          <div class="skeleton-draft-row">
            <div class="skeleton-draft-meta">
              <div class="skeleton-line" style="width:46px;height:12px;margin:0"></div>
              <div class="skeleton-badge" style="width:88px"></div>
            </div>
            <div class="skeleton-draft-hook"><div class="skeleton-line" style="width:60%;margin:0"></div></div>
            <div class="skeleton-line" style="width:15px;height:15px;margin:0;flex-shrink:0;border-radius:var(--radius-sm)"></div>
          </div>
          <div class="skeleton-draft-row">
            <div class="skeleton-draft-meta">
              <div class="skeleton-line" style="width:40px;height:12px;margin:0"></div>
              <div class="skeleton-badge" style="width:64px"></div>
            </div>
            <div class="skeleton-draft-hook"><div class="skeleton-line" style="width:85%;margin:0"></div></div>
            <div class="skeleton-line" style="width:15px;height:15px;margin:0;flex-shrink:0;border-radius:var(--radius-sm)"></div>
          </div>
          <div class="skeleton-draft-row">
            <div class="skeleton-draft-meta">
              <div class="skeleton-line" style="width:50px;height:12px;margin:0"></div>
              <div class="skeleton-badge" style="width:78px"></div>
            </div>
            <div class="skeleton-draft-hook"><div class="skeleton-line" style="width:55%;margin:0"></div></div>
            <div class="skeleton-line" style="width:15px;height:15px;margin:0;flex-shrink:0;border-radius:var(--radius-sm)"></div>
          </div>
        </div>
      </div>
    </div>

    <footer class="app-footer" role="contentinfo">
      <div class="app-footer-inner">
        <a href="https://www.scouthook.com/privacy" target="_blank" rel="noopener">Privacy Policy</a>
        <span class="app-footer-sep">|</span>
        <a href="https://www.scouthook.com/terms" target="_blank" rel="noopener">Terms of Service</a>
        <span class="app-footer-sep">|</span>
        <a href="/help.html">Help</a>
        <p class="app-footer-legal">&copy; 2026 CopyPower Digital LLP. ScoutHook is an AI-powered authority engine.</p>
      </div>
    </footer>

  </div><!-- /main-content -->

  <script src="/js/session.js"></script>
  <script src="/js/ui-toast.js"></script>
  <script src="/js/account-bar.js"></script>
  <script src="/js/app-router.js"></script>
  <script src="/js/drafts.js"></script>
</body>
</html>
