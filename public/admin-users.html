<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — ScoutHook Admin</title>
  <link rel="stylesheet" href="/css/scouthook.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .admin-nav { background: var(--color-surface); border-bottom: 1px solid var(--color-border); padding: 0 var(--space-xl); display: flex; align-items: center; gap: var(--space-xl); height: 52px; }
    .admin-nav__brand { font-weight: 700; font-size: 1rem; color: var(--color-text); text-decoration: none; margin-right: var(--space-md); white-space: nowrap; }
    .admin-nav__brand span { color: rgba(255,255,255,0.45); font-weight: 400; font-size: 0.75rem; margin-left: 4px; }
    .admin-nav__links { display: flex; align-items: center; gap: 2px; flex: 1; }
    .admin-nav__link { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 0.875rem; padding: var(--space-xs) var(--space-sm); border-radius: var(--radius-sm); border-bottom: 2px solid transparent; transition: color .15s; }
    .admin-nav__link:hover { color: rgba(255,255,255,0.9); }
    .admin-nav__link--active { color: var(--color-accent-light, #0FA87F); border-bottom-color: var(--color-accent-light, #0FA87F); }
    .admin-nav__sep { width: 1px; height: 20px; background: var(--color-border); margin: 0 var(--space-sm); }
    .admin-auth { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
    .admin-auth__card { width: 100%; max-width: 380px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .data-table th { text-align: left; font-size: 0.72rem; text-transform: uppercase; letter-spacing: .06em; color: rgba(255,255,255,0.45); padding: var(--space-sm) var(--space-md); border-bottom: 1px solid var(--color-border); font-weight: 600; }
    .data-table td { padding: var(--space-sm) var(--space-md); border-bottom: 1px solid var(--color-border); vertical-align: middle; }
    .data-table tr:hover td { background: var(--color-surface-2, rgba(255,255,255,.03)); cursor: pointer; }
    .badge { display: inline-block; border-radius: var(--radius-sm, 4px); padding: 2px 8px; font-size: 0.78rem; font-weight: 700; }
    .badge--pro      { background: rgba(13,122,95,.18); color: #0FA87F; }
    .badge--trialing { background: rgba(245,158,11,.18); color: #f59e0b; }
    .badge--free     { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
    .badge--canceled { background: rgba(239,68,68,.18); color: #ef4444; }
    .badge--pastdue  { background: rgba(239,68,68,.18); color: #ef4444; }
    .slide-over { position: fixed; top: 0; right: 0; width: 440px; max-width: 100vw; height: 100vh; background: var(--color-surface); border-left: 1px solid var(--color-border); transform: translateX(100%); transition: transform .25s ease; z-index: 200; overflow-y: auto; display: flex; flex-direction: column; }
    .slide-over--open { transform: translateX(0); }
    .slide-over__header { padding: var(--space-lg); border-bottom: 1px solid var(--color-border); display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-md); }
    .slide-over__body { padding: var(--space-lg); flex: 1; }
    .slide-over__section { padding-top: var(--space-xl); border-top: 1px solid var(--color-border); margin-top: var(--space-xl); }
    .slide-over__section:first-child { border-top: none; margin-top: 0; padding-top: 0; }
    .slide-over__section-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: .06em; color: rgba(255,255,255,0.45); font-weight: 600; margin-bottom: var(--space-md); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 199; display: none; }
    .overlay--visible { display: block; }
    .search-bar { display: flex; gap: var(--space-sm); margin-bottom: var(--space-lg); }
    .search-bar input { flex: 1; }
    .detail-row { display: flex; justify-content: space-between; margin-bottom: var(--space-sm); font-size: 0.875rem; }
    .detail-row__label { color: rgba(255,255,255,0.5); }
    .mini-post { padding: var(--space-sm) 0; border-bottom: 1px solid var(--color-border); font-size: 0.8rem; }
    .mini-post:last-child { border-bottom: none; }
    .mini-post__content { color: rgba(255,255,255,0.5); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

  <div id="auth-screen" class="admin-auth">
    <div class="admin-auth__card card">
      <h2 style="margin-bottom: var(--space-md);">ScoutHook Admin</h2>
      <div class="field"><label for="pw-input">Admin password</label><input type="password" id="pw-input" placeholder="ADMIN_PASSWORD" /></div>
      <div id="pw-error" class="hidden" style="color: var(--color-error); font-size: 0.85rem; margin-bottom: var(--space-md);"></div>
      <button id="pw-btn" class="btn btn--primary" style="width:100%">Unlock</button>
    </div>
  </div>

  <div id="main" class="hidden">
    <nav class="admin-nav">
      <a href="/admin.html" class="admin-nav__brand">Scout&#x25AA;hook <span>Admin</span></a>
      <div class="admin-nav__links">
        <a href="/admin.html" class="admin-nav__link">Dashboard</a>
        <a href="/admin-users.html" class="admin-nav__link admin-nav__link--active">Users</a>
        <a href="/admin-feedback.html" class="admin-nav__link">Feedback</a>
        <a href="/admin-support.html" class="admin-nav__link">Support</a>
        <div class="admin-nav__sep"></div>
        <a href="/admin-settings.html" class="admin-nav__link">Settings</a>
        <a href="/admin-templates.html" class="admin-nav__link">Templates</a>
      </div>
    </nav>

    <main class="container--wide" style="padding: var(--space-xl);">
      <h1 style="margin-bottom: var(--space-lg);">Users</h1>

      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search by email or name…" />
        <button id="search-btn" class="btn btn--secondary">Search</button>
      </div>

      <div class="card" style="overflow-x: auto;">
        <table class="data-table" id="users-table">
          <thead>
            <tr>
              <th>Full Name</th>
              <th>Email</th>
              <th>Country</th>
              <th>Status</th>
              <th>Last Active</th>
              <th>Registered</th>
              <th>Posts</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="7" style="text-align:center;color:rgba(255,255,255,0.45);padding:var(--space-xl);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Slide-over panel -->
  <div class="slide-over" id="slide-over">
    <div class="slide-over__header">
      <div>
        <div id="so-name" style="font-weight:700;font-size:1.1rem;"></div>
        <div id="so-email" style="font-size:0.85rem;color:rgba(255,255,255,0.45);margin-top:2px;"></div>
      </div>
      <button id="close-panel" class="btn btn--secondary btn--sm" style="flex-shrink:0;">✕ Close</button>
    </div>
    <div class="slide-over__body" id="so-body">
      <div style="color:rgba(255,255,255,0.45);font-size:0.875rem;">Loading…</div>
    </div>
  </div>

  <script>
    let adminPw = '';

    function init() {
      const saved = sessionStorage.getItem('adminPw');
      if (saved) { adminPw = saved; showMain(); return; }
    }

    document.getElementById('pw-btn').addEventListener('click', async () => {
      const pw = document.getElementById('pw-input').value;
      const r = await fetch('/admin/settings', { headers: { 'X-Admin-Password': pw } });
      if (r.status === 401) { document.getElementById('pw-error').textContent = 'Incorrect password.'; document.getElementById('pw-error').classList.remove('hidden'); return; }
      adminPw = pw; sessionStorage.setItem('adminPw', pw); showMain();
    });
    document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pw-btn').click(); });

    function showMain() {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('main').classList.remove('hidden');
      loadUsers();
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function relativeTime(iso) {
      if (!iso) return '—';
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 2) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days < 30) return `${days}d ago`;
      return new Date(iso).toLocaleDateString();
    }

    function statusBadge(plan, status) {
      if (!status || status === 'free' || (!plan && !status)) return `<span class="badge badge--free">Free</span>`;
      if (status === 'active' && plan === 'pro') return `<span class="badge badge--pro">Pro</span>`;
      if (status === 'trialing') return `<span class="badge badge--trialing">Trialing</span>`;
      if (status === 'canceled') return `<span class="badge badge--canceled">Canceled</span>`;
      if (status === 'past_due') return `<span class="badge badge--pastdue">Past Due</span>`;
      return `<span class="badge badge--free">${esc(status)}</span>`;
    }

    async function loadUsers(search = '') {
      const params = search ? `?search=${encodeURIComponent(search)}` : '';
      const r = await fetch(`/admin/users${params}`, { headers: { 'X-Admin-Password': adminPw } });
      const data = await r.json();
      const tbody = document.getElementById('users-tbody');
      if (!data.ok || !data.users.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:rgba(255,255,255,0.45);padding:var(--space-xl);">No users found.</td></tr>`;
        return;
      }
      tbody.innerHTML = data.users.map(u => `
        <tr data-uid="${esc(u.user_id)}">
          <td>${esc(u.display_name || '—')}</td>
          <td>${esc(u.email || '—')}</td>
          <td>${esc(u.country || '—')}</td>
          <td>${statusBadge(u.plan, u.status)}</td>
          <td>${relativeTime(u.last_active)}</td>
          <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</td>
          <td>${u.post_count ?? 0}</td>
        </tr>`).join('');
      tbody.querySelectorAll('tr[data-uid]').forEach(tr => {
        tr.addEventListener('click', () => openPanel(tr.dataset.uid));
      });
    }

    document.getElementById('search-btn').addEventListener('click', () => {
      loadUsers(document.getElementById('search-input').value.trim());
    });
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });

    // ── Slide-over ────────────────────────────────────────────────────────────
    async function openPanel(userId) {
      document.getElementById('slide-over').classList.add('slide-over--open');
      document.getElementById('overlay').classList.add('overlay--visible');
      document.getElementById('so-body').innerHTML = '<div style="color:rgba(255,255,255,0.45);font-size:0.875rem;">Loading…</div>';

      const r = await fetch(`/admin/users/${encodeURIComponent(userId)}`, { headers: { 'X-Admin-Password': adminPw } });
      const data = await r.json();
      if (!data.ok) { document.getElementById('so-body').innerHTML = `<p style="color:var(--color-error)">Failed to load.</p>`; return; }

      const { profile, subscription, workspaces, connections, profiles, recent_posts } = data;

      document.getElementById('so-name').textContent  = profile.display_name || '—';
      document.getElementById('so-email').textContent = profile.email || '—';

      const trialEnds = subscription?.trial_ends_at
        ? new Date(subscription.trial_ends_at).toLocaleDateString()
        : null;
      const periodEnd = subscription?.current_period_end
        ? new Date(subscription.current_period_end).toLocaleDateString()
        : null;

      document.getElementById('so-body').innerHTML = `
        <!-- Header info -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Profile</div>
          <div class="detail-row"><span class="detail-row__label">Country</span><span>${esc(profile.country || '—')}</span></div>
          <div class="detail-row"><span class="detail-row__label">Registered</span><span>${profile.created_at ? new Date(profile.created_at).toLocaleDateString() : '—'}</span></div>
          <div class="detail-row"><span class="detail-row__label">User ID</span><span style="font-family:monospace;font-size:0.8rem;">${esc(profile.user_id)}</span></div>
        </div>

        <!-- Subscription -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Subscription</div>
          <div class="detail-row"><span class="detail-row__label">Plan</span><span>${statusBadge(subscription?.plan, subscription?.status)}</span></div>
          ${trialEnds ? `<div class="detail-row"><span class="detail-row__label">Trial ends</span><span>${trialEnds}</span></div>` : ''}
          ${periodEnd ? `<div class="detail-row"><span class="detail-row__label">Renewal</span><span>${periodEnd}</span></div>` : ''}
        </div>

        <!-- Trial extension -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Extend Trial</div>
          <div style="display:flex;align-items:center;gap:var(--space-sm);">
            <input type="number" id="trial-days" value="7" min="1" max="90" style="width:70px;" />
            <span style="font-size:0.875rem;color:rgba(255,255,255,0.45);">days</span>
            <button class="btn btn--primary btn--sm" id="extend-btn" data-uid="${esc(profile.user_id)}">Extend trial</button>
          </div>
          <div id="extend-msg" style="font-size:0.8rem;margin-top:var(--space-sm);display:none;"></div>
        </div>

        <!-- Workspaces -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Workspaces</div>
          ${workspaces.length ? workspaces.map(w => `
            <div class="detail-row">
              <span>${esc(w.name)}${w.deleted_at ? ' <span style="color:var(--color-error);font-size:0.75rem;">[deleted]</span>' : ''}</span>
              <span style="color:rgba(255,255,255,0.5)">${w.post_count} posts · ${w.member_count} members</span>
            </div>`).join('') : '<p style="color:rgba(255,255,255,0.45);font-size:0.875rem;">No workspaces.</p>'}
        </div>

        <!-- LinkedIn -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">LinkedIn Accounts</div>
          ${connections.length ? connections.map(c => `
            <div class="detail-row">
              <span>${esc(c.display_name || 'Unknown')}</span>
              <span style="color:rgba(255,255,255,0.5)">${esc(c.account_type)} · expires ${c.expires_at ? new Date(c.expires_at).toLocaleDateString() : 'unknown'}</span>
            </div>`).join('') : '<p style="color:rgba(255,255,255,0.45);font-size:0.875rem;">No connections.</p>'}
        </div>

        <!-- Voice profile -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Voice Profiles</div>
          ${profiles.length ? profiles.map(p => `
            <div class="detail-row">
              <span>${esc(p.display_name || 'Profile')}</span>
              <span style="color:rgba(255,255,255,0.5)">${p.voice_profile_completion_pct ?? 0}% complete · ${p.onboarding_complete ? 'onboarding done' : 'onboarding pending'}</span>
            </div>`).join('') : '<p style="color:rgba(255,255,255,0.45);font-size:0.875rem;">No profiles.</p>'}
        </div>

        <!-- Recent posts -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Recent Posts (last 10)</div>
          ${recent_posts.length ? recent_posts.map(p => `
            <div class="mini-post">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:var(--space-sm);">
                <span style="font-size:0.75rem;color:rgba(255,255,255,0.5)">${p.archetype_used || '—'}</span>
                <span class="badge badge--${p.status === 'published' ? 'pro' : 'free'}" style="font-size:0.7rem;">${esc(p.status)}</span>
                <span style="font-size:0.75rem;color:rgba(255,255,255,0.5)">${p.created_at ? new Date(p.created_at).toLocaleDateString() : ''}</span>
              </div>
              <div class="mini-post__content">${esc((p.content || '').slice(0, 100))}${(p.content || '').length > 100 ? '…' : ''}</div>
            </div>`).join('') : '<p style="color:rgba(255,255,255,0.45);font-size:0.875rem;">No posts yet.</p>'}
        </div>
      `;

      document.getElementById('extend-btn')?.addEventListener('click', async () => {
        const days = parseInt(document.getElementById('trial-days').value);
        const uid  = document.getElementById('extend-btn').dataset.uid;
        const msg  = document.getElementById('extend-msg');
        msg.style.display = 'block';
        msg.style.color = 'rgba(255,255,255,0.5)';
        msg.textContent = 'Extending…';
        const r = await fetch(`/admin/users/${encodeURIComponent(uid)}/extend-trial`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPw },
          body: JSON.stringify({ days }),
        });
        const data = await r.json();
        msg.style.color = data.ok ? 'var(--color-success, #0FA87F)' : 'var(--color-error)';
        msg.textContent = data.ok ? `Trial extended by ${days} day${days !== 1 ? 's' : ''}.` : (data.error || 'Failed.');
      });
    }

    function closePanel() {
      document.getElementById('slide-over').classList.remove('slide-over--open');
      document.getElementById('overlay').classList.remove('overlay--visible');
    }
    document.getElementById('close-panel').addEventListener('click', closePanel);
    document.getElementById('overlay').addEventListener('click', closePanel);

    init();
  </script>
</body>
</html>
