<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Templates — ScoutHook Admin</title>
  <link rel="stylesheet" href="/css/scouthook.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <script src="/js/admin-nav.js"></script>
</head>
<body>

  <!-- Auth screen -->
  <div id="auth-screen" class="admin-auth">
    <div class="admin-auth__card card">
      <h2 class="admin-auth__title">ScoutHook Admin</h2>
      <div class="field"><label for="pw-input">Admin password</label><input type="password" id="pw-input" placeholder="ADMIN_PASSWORD" /></div>
      <div id="pw-error" class="admin-error-msg hidden"></div>
      <button id="pw-btn" class="btn btn--primary">Unlock</button>
    </div>
  </div>

  <!-- Main app -->
  <div id="main" class="hidden">
    <div id="admin-nav-container"></div>

    <main class="admin-main">
      <div class="admin-templates-body">

        <div class="admin-page-header">
          <div>
            <h1>HTML Templates</h1>
            <p class="text-muted admin-page-subtitle">Canva-designed templates rendered via Puppeteer. Users select, AI fills text slots, they adjust colors and images.</p>
          </div>
          <button id="add-btn" class="btn btn--primary">+ Add template</button>
        </div>

        <div class="card card--section" id="template-list">
          <div class="loading-text--padded">Loading…</div>
        </div>

      </div>
    </main>
  </div>

<script>
  let adminPw = '';

  // ── Auth ──────────────────────────────────────────────────────────────────

  const saved = sessionStorage.getItem('adminPw');
  if (saved) { adminPw = saved; showMain(); }

  document.getElementById('pw-btn').addEventListener('click', async () => {
    const pw = document.getElementById('pw-input').value.trim();
    const r = await fetch('/admin/html-templates', { headers: { 'X-Admin-Password': pw } });
    if (r.status === 401) {
      document.getElementById('pw-error').textContent = 'Wrong password';
      document.getElementById('pw-error').classList.remove('hidden');
      return;
    }
    adminPw = pw; sessionStorage.setItem('adminPw', pw); showMain();
  });
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('pw-btn').click();
  });

  function showMain() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    loadTemplates();
  }

  function adminFetch(path, opts = {}) {
    opts.headers = opts.headers || {};
    opts.headers['X-Admin-Password'] = adminPw;
    if (opts.body && !opts.headers['Content-Type']) {
      opts.headers['Content-Type'] = 'application/json';
    }
    return fetch(path, opts);
  }

  // ── Navigation ────────────────────────────────────────────────────────────

  document.getElementById('add-btn').addEventListener('click', () => {
    location.href = '/admin-html-template-form.html';
  });

  // ── Load templates ────────────────────────────────────────────────────────

  async function loadTemplates() {
    const list = document.getElementById('template-list');
    const r = await adminFetch('/admin/html-templates');
    const { templates } = await r.json();

    if (!templates || templates.length === 0) {
      list.innerHTML = '<p class="text-muted loading-text--padded">No templates yet. Click "+ Add template" to create one.</p>';
      return;
    }

    list.innerHTML = templates.map(t => {
      const hasThumb = !!t.thumbnail_r2_key;
      const slots = t.slot_manifest?.slots ? Object.keys(t.slot_manifest.slots) : [];
      const escapedName = esc(t.name);
      return `
      <div class="template-row" data-id="${t.id}" data-name="${escapedName}" data-active="${t.active}">
        ${hasThumb
          ? `<img class="template-row__thumb" data-thumb-url="/admin/html-templates/${t.id}/thumbnail" alt="${escapedName}">`
          : `<div class="template-row__placeholder">${esc((t.name || '?').slice(0, 2).toUpperCase())}</div>`}
        <div class="template-row__info">
          <div class="template-row__name">
            ${escapedName}
            <span style="display:inline-block;padding:1px 6px;border-radius:99px;font-size:.7rem;font-weight:600;margin-left:6px;${t.active ? 'background:#d1fae5;color:#065f46' : 'background:#f3f4f6;color:#6b7280'}">${t.active ? 'Active' : 'Inactive'}</span>
          </div>
          <div class="template-row__meta">
            ${slots.length} slot${slots.length !== 1 ? 's' : ''}${t.category ? ` · <code>${esc(t.category)}</code>` : ''}
          </div>
        </div>
        <div class="template-row__actions">
          <button class="btn btn--secondary btn--sm js-edit">Edit</button>
          <button class="btn btn--secondary btn--sm js-toggle">${t.active ? 'Deactivate' : 'Activate'}</button>
          ${!t.thumbnail_r2_key ? `<button class="btn btn--secondary btn--sm js-regen">⟳ Thumbnail</button>` : ''}
          <button class="btn btn--secondary btn--sm btn--danger js-delete">Delete</button>
        </div>
      </div>`;
    }).join('');

    // Event delegation
    list.querySelectorAll('.template-row').forEach(row => {
      const { id, name } = row.dataset;

      row.querySelector('.js-edit').addEventListener('click', () => {
        location.href = `/admin-html-template-form.html?id=${id}`;
      });

      row.querySelector('.js-toggle').addEventListener('click', () => toggleTemplate(id));

      row.querySelector('.js-regen')?.addEventListener('click', e => regenThumb(id, e.currentTarget));

      row.querySelector('.js-delete').addEventListener('click', () => deleteTemplate(id, name));
    });

    // Load thumbnails via authenticated fetch (img tags can't send custom headers)
    list.querySelectorAll('.template-row__thumb[data-thumb-url]').forEach(async (img) => {
      try {
        const r = await adminFetch(img.dataset.thumbUrl);
        if (!r.ok) throw new Error();
        const blob = await r.blob();
        img.src = URL.createObjectURL(blob);
      } catch {
        const placeholder = document.createElement('div');
        placeholder.className = 'template-row__placeholder';
        placeholder.textContent = (img.alt || '??').slice(0, 2).toUpperCase();
        img.replaceWith(placeholder);
      }
    });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Template actions ──────────────────────────────────────────────────────

  async function toggleTemplate(id) {
    await adminFetch(`/admin/html-templates/${id}/toggle`, { method: 'POST' });
    loadTemplates();
  }

  async function regenThumb(id, btn) {
    btn.textContent = '⟳ Generating…'; btn.disabled = true;
    const r = await adminFetch(`/admin/html-templates/${id}/regenerate-thumbnail`, { method: 'POST' });
    const data = await r.json();
    if (data.ok) {
      loadTemplates();
    } else {
      alert('Thumbnail generation failed: ' + data.error);
      btn.textContent = '⟳ Thumbnail'; btn.disabled = false;
    }
  }

  async function deleteTemplate(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    await adminFetch(`/admin/html-templates/${id}`, { method: 'DELETE' });
    loadTemplates();
  }
</script>
</body>
</html>
