<!-- subject: New feedback from {{user_name}} -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:40px 0;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">
        <!-- Header -->
        <tr><td style="background:#0f172a;padding:24px 40px;">
          <img src="{{app_url}}/images/scout-hook-logo.png" alt="ScoutHook" width="150" height="33" style="display:block;border:0;">
        </td></tr>
        <!-- Body -->
        <tr><td style="padding:40px 40px 32px;">
          <p style="margin:0 0 20px;font-size:16px;color:#111827;">New feedback received</p>

          <table width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;border-left:3px solid #0F766E;border-radius:4px;margin:0 0 24px;">
            <tr><td style="padding:16px 20px;">
              <p style="margin:0 0 4px;font-size:13px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;">Message</p>
              <p style="margin:0;font-size:15px;color:#111827;line-height:1.6;white-space:pre-wrap;">{{message}}</p>
            </td></tr>
          </table>

          <table width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 20px;">
            <tr>
              <td style="padding:0 12px 0 0;width:50%;vertical-align:top;">
                <p style="margin:0 0 4px;font-size:13px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;">Category</p>
                <p style="margin:0;font-size:14px;color:#111827;">{{category}}</p>
              </td>
              <td style="padding:0 0 0 12px;width:50%;vertical-align:top;">
                <p style="margin:0 0 4px;font-size:13px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;">Title</p>
                <p style="margin:0;font-size:14px;color:#111827;">{{title}}</p>
              </td>
            </tr>
          </table>

          <table width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
            <tr>
              <td style="padding:0 12px 0 0;width:50%;vertical-align:top;">
                <p style="margin:0 0 4px;font-size:13px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;">From</p>
                <p style="margin:0;font-size:14px;color:#111827;">{{user_name}}</p>
                <p style="margin:2px 0 0;font-size:14px;color:#6b7280;">{{user_email}}</p>
              </td>
              <td style="padding:0 0 0 12px;width:50%;vertical-align:top;">
                <p style="margin:0 0 4px;font-size:13px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;">Rating</p>
                <p style="margin:0;font-size:14px;color:#111827;">{{rating}}</p>
              </td>
            </tr>
          </table>

          <p style="margin:0 0 4px;font-size:13px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;">Page</p>
          <p style="margin:0 0 28px;font-size:13px;color:#6b7280;word-break:break-all;">{{page_url}}</p>

          <p style="margin:0;font-size:12px;color:#9ca3af;">Submitted {{submitted_at}}</p>
        </td></tr>
        <!-- Footer -->
        <tr><td style="padding:20px 40px;border-top:1px solid #f3f4f6;">
          <p style="margin:0;font-size:12px;color:#9ca3af;">ScoutHook admin notification — reply directly to {{user_email}} to respond.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
