<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Scouthook</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

  <script src="/js/cached-fetch.js"></script>
  <script src="/js/sidebar.js"></script>

  <!-- ── Main content ──────────────────────────────────────── -->
  <div id="main-content">

    <div class="post-page">

      <div class="post-page-header">
        <a href="/Published.html" class="post-page-back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          Published
        </a>
        <a id="post-li-link" href="#" target="_blank" rel="noopener noreferrer" class="pub-view-btn" hidden>
          View on LinkedIn
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>

      <div class="post-page-meta" id="post-page-meta">
        <!-- date + badges rendered by post.js -->
      </div>

      <div class="post-page-content">
      <div class="post-page-card">
        <div class="linkedin-card" style="background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 16px;font-family:-apple-system,system-ui,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif">
          <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:12px">
            <div id="post-li-avatar" class="linkedin-avatar-initials" style="width:48px;height:48px;min-width:48px;border-radius:50%;font-size:18px;font-weight:600;background:#0a66c2;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0"></div>
            <div style="flex:1;min-width:0">
              <p id="post-li-name" style="font-size:14px;font-weight:600;color:#000;margin:0;line-height:1.4"></p>
              <p id="post-li-meta" style="font-size:12px;color:rgba(0,0,0,0.6);margin:2px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3"></p>
              <p style="font-size:12px;color:rgba(0,0,0,0.6);margin:2px 0 0;line-height:1.3">Just now · <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;opacity:0.7"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></p>
            </div>
            <button style="background:none;border:1px solid #0a66c2;color:#0a66c2;border-radius:16px;padding:4px 12px;font-size:14px;font-weight:600;cursor:default;flex-shrink:0" tabindex="-1">Follow</button>
          </div>
          <div id="post-li-body" style="margin-bottom:8px"></div>
          <div style="display:flex;gap:0;padding:4px 0 0;border-top:1px solid #e0e0e0;margin-top:8px">
            <button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;cursor:default;border-radius:4px;font-size:12px;font-weight:600;color:rgba(0,0,0,0.6);font-family:inherit" tabindex="-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>Like
            </button>
            <button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;cursor:default;border-radius:4px;font-size:12px;font-weight:600;color:rgba(0,0,0,0.6);font-family:inherit" tabindex="-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Comment
            </button>
            <button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;cursor:default;border-radius:4px;font-size:12px;font-weight:600;color:rgba(0,0,0,0.6);font-family:inherit" tabindex="-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>Repost
            </button>
            <button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;background:none;border:none;cursor:default;border-radius:4px;font-size:12px;font-weight:600;color:rgba(0,0,0,0.6);font-family:inherit" tabindex="-1">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Send
            </button>
          </div>
        </div>
      </div>

      <div class="post-page-rating" id="post-page-rating">
        <p class="post-page-rating-label">How did this post perform?</p>
        <div id="post-rating-btns" class="perf-modal-btns">
          <button class="perf-modal-btn" data-tag="strong">
            <span class="perf-modal-btn-emoji">🔥</span>
            <span class="perf-modal-btn-label">Strong</span>
            <span class="perf-modal-btn-desc">Got leads, DMs, or real engagement</span>
          </button>
          <button class="perf-modal-btn" data-tag="decent">
            <span class="perf-modal-btn-emoji">👍</span>
            <span class="perf-modal-btn-label">Decent</span>
            <span class="perf-modal-btn-desc">Some engagement, nothing remarkable</span>
          </button>
          <button class="perf-modal-btn" data-tag="weak">
            <span class="perf-modal-btn-emoji">👎</span>
            <span class="perf-modal-btn-label">Weak</span>
            <span class="perf-modal-btn-desc">Little to no engagement</span>
          </button>
        </div>
        <div id="post-rated-badge" class="post-rated-badge" hidden></div>
      </div>

      </div><!-- /post-page-content -->

    </div><!-- /post-page -->

    <footer class="app-footer" role="contentinfo">
      <div class="app-footer-inner">
        <a href="https://www.scouthook.com/privacy" target="_blank" rel="noopener">Privacy Policy</a>
        <span class="app-footer-sep">|</span>
        <a href="https://www.scouthook.com/terms" target="_blank" rel="noopener">Terms of Service</a>
        <span class="app-footer-sep">|</span>
        <a href="/help.html">Help</a>
        <p class="app-footer-legal">© 2026 CopyPower Digital LLP. ScoutHook is an AI-powered authority engine.</p>
      </div>
    </footer>

  </div><!-- /main-content -->

  <script src="/js/session.js"></script>
  <script src="/js/ui-toast.js"></script>
  <script src="/js/account-bar.js"></script>
  <script src="/js/app-router.js"></script>
  <script src="/js/post.js"></script>
</body>
</html>
