# fly.toml app configuration file generated for scouthook-render on 2026-06-25T10:05:38+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'scouthook-render'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true

[http_service.concurrency]
  type = 'requests'
  hard_limit = 10
  soft_limit = 3

[[http_service.checks]]
  interval = '15s'
  timeout = '5s'
  grace_period = '30s'
  method = 'GET'
  path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
