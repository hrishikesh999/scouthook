<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idea Vault — ScoutHook</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ── Ideas page ─────────────────────────────────────────────── */
    .ideas-page {
      display: flex;
      flex-direction: column;
      padding: var(--space-8);
      max-width: 1100px;
      margin: 0 auto;
      height: 100%;
      box-sizing: border-box;
      gap: var(--space-6);
    }

    /* ── Funnel health bar ──────────────────────────────────────── */
    .funnel-widget {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-4) var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-6);
      flex-wrap: wrap;
    }
    .funnel-widget-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .funnel-bars {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      flex: 1;
      flex-wrap: wrap;
    }
    .funnel-bar-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 0.8125rem;
    }
    .funnel-bar-track {
      width: 80px;
      height: 6px;
      background: var(--bg-pill);
      border-radius: var(--radius-pill);
      overflow: hidden;
    }
    .funnel-bar-fill {
      height: 100%;
      border-radius: var(--radius-pill);
      transition: width 0.4s ease;
    }
    .funnel-bar-fill.reach   { background: #6366F1; }
    .funnel-bar-fill.trust   { background: var(--brand); }
    .funnel-bar-fill.convert { background: var(--accent); }
    .funnel-bar-label {
      color: var(--text-secondary);
      min-width: 40px;
    }
    .funnel-bar-count {
      font-weight: 600;
      color: var(--text-heading);
      min-width: 18px;
    }
    .funnel-suggestion {
      font-size: 0.8125rem;
      color: var(--text-muted);
      padding-left: var(--space-4);
      border-left: 2px solid var(--border);
      white-space: nowrap;
    }
    .funnel-suggestion strong {
      color: var(--text-heading);
    }

    /* ── Header + filters ───────────────────────────────────────── */
    .ideas-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      flex-wrap: wrap;
    }
    .ideas-heading {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-heading);
      margin: 0;
    }
    .ideas-filters {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .filter-btn {
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--brand); color: var(--brand); }
    .filter-btn.active { border-color: var(--brand); background: #F0FDF9; color: var(--brand); font-weight: 600; }

    /* ── Columns ────────────────────────────────────────────────── */
    .ideas-columns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-5);
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .ideas-column {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      min-width: 0;
    }
    .ideas-column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: var(--space-2);
      border-bottom: 2px solid var(--border);
    }
    .ideas-column-title {
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-secondary);
      margin: 0;
    }
    .ideas-column-count {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg-pill);
      padding: 1px 7px;
      border-radius: var(--radius-pill);
    }
    .ideas-column-scroll {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      flex: 1;
      padding-bottom: var(--space-2);
    }

    /* ── Idea cards ─────────────────────────────────────────────── */
    .idea-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      transition: box-shadow 0.15s;
    }
    .idea-card:hover { box-shadow: var(--shadow-md); }

    .idea-card-badges {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .idea-badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.6875rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .idea-badge.reach   { background: #EEF2FF; color: #4338CA; }
    .idea-badge.trust   { background: #F0FDF4; color: #166534; }
    .idea-badge.convert { background: #ECFDF5; color: #065F46; }
    .idea-badge.archetype { background: var(--bg-pill); color: var(--text-secondary); }

    .idea-card-text {
      font-size: 0.875rem;
      color: var(--text-body);
      line-height: 1.55;
      margin: 0;
    }

    .idea-card-source {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 0;
      font-style: italic;
    }

    /* Card actions */
    .idea-card-actions { display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .idea-card-actions.used { gap: 0; }

    .idea-action-btn {
      font-family: var(--font-sans);
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: var(--radius-md);
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .idea-action-btn.primary  { background: var(--brand); color: #fff; border-color: var(--brand); }
    .idea-action-btn.primary:hover { background: var(--brand-hover); border-color: var(--brand-hover); }
    .idea-action-btn.secondary { background: var(--bg-surface); color: var(--text-secondary); border-color: var(--border); }
    .idea-action-btn.secondary:hover { border-color: var(--brand); color: var(--brand); }
    .idea-action-btn.danger { background: var(--bg-surface); color: var(--text-muted); border-color: transparent; }
    .idea-action-btn.danger:hover { color: var(--text-danger); }
    .idea-used-label { font-size: 0.8125rem; color: var(--text-muted); padding: 7px 2px; }

    /* Empty column state */
    .ideas-col-empty {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-muted);
      font-size: 0.8125rem;
      border: 1px dashed var(--border-light);
      border-radius: var(--radius-lg);
    }

    /* Vault CTA */
    .ideas-vault-cta {
      text-align: center;
      padding: var(--space-12) var(--space-8);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--bg-subtle);
    }
    .ideas-vault-cta p { color: var(--text-muted); font-size: 0.9375rem; margin: 0 0 var(--space-4) 0; }
    .ideas-vault-cta a {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 0.9375rem;
      font-weight: 600;
      background: var(--brand);
      color: #fff;
      padding: 10px var(--space-5);
      border-radius: var(--radius-md);
      text-decoration: none;
      transition: background 0.15s;
    }
    .ideas-vault-cta a:hover { background: var(--brand-hover); }
  </style>
</head>
<body>

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside id="sidebar" role="navigation" aria-label="Main navigation">
    <a href="/dashboard.html" class="sidebar-logo">
      <img src="/images/scout-hook-logo.png" alt="ScoutHook" class="sidebar-logo-img">
    </a>
    <div class="sidebar-cta">
      <a href="/generate.html?new=1" class="sidebar-cta-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create Post
      </a>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard.html" class="sidebar-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a href="/generate.html" class="sidebar-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Generate</a>
      <a href="/vault.html" class="sidebar-link active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Idea Vault</a>
      <a href="/drafts.html" class="sidebar-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>Drafts</a>
      <a href="/schedule.html" class="sidebar-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Schedule</a>
      <a href="/Published.html" class="sidebar-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Published</a>
      <a href="/Media.html" class="sidebar-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Media</a>
      <a href="/account.html" class="sidebar-link"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Account Settings</a>
    </nav>
    <div class="sidebar-bottom">
      <div id="sidebar-account-slot" aria-label="Signed-in account"></div>
    </div>
  </aside>

  <!-- ── Main content ──────────────────────────────────────────── -->
  <div id="main-content">
    <main id="app" style="padding: 0; overflow-y: auto;">
      <div style="max-width: 1100px; margin: 0 auto; padding: var(--space-6) var(--space-8) 0;">
        <div class="input-tab-bar" role="tablist" aria-label="Idea Vault">
          <a href="/vault.html" class="input-tab" role="tab" aria-selected="false">Vault</a>
          <a href="/ideas.html" class="input-tab active" role="tab" aria-selected="true">Ideas</a>
        </div>
      </div>
      <div class="ideas-page">

        <!-- ── Funnel health widget ────────────────────────────── -->
        <div class="funnel-widget" id="funnel-widget" style="display:none" role="region" aria-label="Content funnel health">
          <span class="funnel-widget-label">30-day funnel</span>
          <div class="funnel-bars" id="funnel-bars"></div>
          <div class="funnel-suggestion" id="funnel-suggestion"></div>
        </div>

        <!-- ── Header + filters ───────────────────────────────── -->
        <div class="ideas-header">
          <h1 class="ideas-heading">Your Ideas</h1>
          <div class="ideas-filters" role="group" aria-label="Filter by funnel type">
            <button class="filter-btn active" data-funnel="">All</button>
            <button class="filter-btn" data-funnel="reach">Reach</button>
            <button class="filter-btn" data-funnel="trust">Trust</button>
            <button class="filter-btn" data-funnel="convert">Convert</button>
          </div>
        </div>

        <!-- ── Columns (Fresh / Saved / Discarded) ────────────── -->
        <div class="ideas-columns" id="ideas-columns">
          <!-- Column: Fresh -->
          <div class="ideas-column">
            <div class="ideas-column-header">
              <h2 class="ideas-column-title">Fresh</h2>
              <span class="ideas-column-count" id="count-fresh">0</span>
            </div>
            <div class="ideas-column-scroll" id="col-fresh"></div>
          </div>
          <!-- Column: Saved -->
          <div class="ideas-column">
            <div class="ideas-column-header">
              <h2 class="ideas-column-title">Saved</h2>
              <span class="ideas-column-count" id="count-saved">0</span>
            </div>
            <div class="ideas-column-scroll" id="col-saved"></div>
          </div>
          <!-- Column: Discarded -->
          <div class="ideas-column">
            <div class="ideas-column-header">
              <h2 class="ideas-column-title">Discarded</h2>
              <span class="ideas-column-count" id="count-discarded">0</span>
            </div>
            <div class="ideas-column-scroll" id="col-discarded"></div>
          </div>
        </div>

        <!-- ── Empty state (no vault docs) ───────────────────── -->
        <div id="ideas-empty" class="ideas-vault-cta" style="display:none">
          <p>Your ideas bank is empty. Upload documents to your Vault and click "Generate Ideas" to mine your expertise.</p>
          <a href="/vault.html">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            Go to Vault
          </a>
        </div>

      </div>
    </main>
  </div>

  <script>
  'use strict';

  // ── State ─────────────────────────────────────────────────────
  let allIdeas = [];
  let activeFunnel = '';

  // ── DOM refs ──────────────────────────────────────────────────
  const funnelWidget     = document.getElementById('funnel-widget');
  const funnelBars       = document.getElementById('funnel-bars');
  const funnelSuggestion = document.getElementById('funnel-suggestion');
  const filterBtns       = document.querySelectorAll('.filter-btn');
  const colFresh         = document.getElementById('col-fresh');
  const colSaved         = document.getElementById('col-saved');
  const colDiscarded     = document.getElementById('col-discarded');
  const countFresh       = document.getElementById('count-fresh');
  const countSaved       = document.getElementById('count-saved');
  const countDiscarded   = document.getElementById('count-discarded');
  const ideasEmpty       = document.getElementById('ideas-empty');
  const ideasColumns     = document.getElementById('ideas-columns');

  // ── Funnel health ─────────────────────────────────────────────
  async function loadFunnelHealth() {
    try {
      const res  = await fetch('/api/funnel/health');
      const data = await res.json();
      if (!data.ok || data.total === 0) return;

      funnelWidget.style.display = '';

      const types = [
        { key: 'reach',   label: 'Reach',   target: 70 },
        { key: 'trust',   label: 'Trust',   target: 20 },
        { key: 'convert', label: 'Convert', target: 10 },
      ];

      funnelBars.innerHTML = types.map(t => `
        <div class="funnel-bar-item">
          <span class="funnel-bar-label">${t.label}</span>
          <div class="funnel-bar-track">
            <div class="funnel-bar-fill ${t.key}" style="width:${Math.min(data.actual[t.key], 100)}%"></div>
          </div>
          <span class="funnel-bar-count">${data.counts[t.key]}</span>
        </div>
      `).join('');

      const next   = data.nextSuggested;
      const recipe = data.suggestedRecipe;
      funnelSuggestion.innerHTML = `You need more <strong>${next}</strong> content — try <strong>${escHtml(recipe.name)}</strong>`;

    } catch { /* non-fatal */ }
  }

  // ── Filter buttons ────────────────────────────────────────────
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFunnel = btn.dataset.funnel || '';
      renderColumns();
    });
  });

  // ── Load ideas ────────────────────────────────────────────────
  async function loadIdeas() {
    try {
      const res  = await fetch('/api/vault/ideas');
      const data = await res.json();
      if (!data.ok) return;
      allIdeas = data.ideas || [];
      renderColumns();
      if (!allIdeas.length) {
        ideasEmpty.style.display    = '';
        ideasColumns.style.display  = 'none';
      } else {
        ideasEmpty.style.display    = 'none';
        ideasColumns.style.display  = '';
      }
    } catch { /* non-fatal */ }
  }

  function filtered(status) {
    return allIdeas.filter(i =>
      i.status === status &&
      (!activeFunnel || i.funnel_type === activeFunnel)
    );
  }

  function renderColumns() {
    const fresh     = filtered('fresh');
    const saved     = filtered('saved');
    const discarded = filtered('discarded');
    const used      = filtered('used');

    countFresh.textContent     = fresh.length;
    countSaved.textContent     = saved.length;
    countDiscarded.textContent = discarded.length;

    colFresh.innerHTML     = fresh.length
      ? fresh.map(i => renderCard(i)).join('')
      : `<div class="ideas-col-empty">No fresh ideas${activeFunnel ? ` for "${activeFunnel}"` : ''}. Go to Vault → Generate Ideas.</div>`;

    colSaved.innerHTML     = saved.length
      ? saved.map(i => renderCard(i)).join('')
      : `<div class="ideas-col-empty">No saved ideas${activeFunnel ? ` for "${activeFunnel}"` : ''} yet.</div>`;

    colDiscarded.innerHTML = discarded.length
      ? discarded.map(i => renderCard(i, true)).join('')
      : `<div class="ideas-col-empty">Nothing discarded${activeFunnel ? ` for "${activeFunnel}"` : ''}.</div>`;

    // Wire action buttons
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', handleCardAction);
    });
  }

  function renderCard(idea, isDiscarded = false) {
    const funnelBadge = idea.funnel_type
      ? `<span class="idea-badge ${idea.funnel_type}">${idea.funnel_type.toUpperCase()}</span>`
      : '';
    const archetypeBadge = idea.hook_archetype
      ? `<span class="idea-badge archetype">${idea.hook_archetype}</span>`
      : '';

    let actions;
    if (idea.status === 'used') {
      actions = `<div class="idea-card-actions used"><span class="idea-used-label">✓ Draft created</span></div>`;
    } else if (isDiscarded) {
      actions = `
        <div class="idea-card-actions">
          <button class="idea-action-btn secondary" data-action="restore" data-id="${idea.id}">Restore</button>
        </div>`;
    } else {
      const saveOrFresh = idea.status === 'saved'
        ? `<button class="idea-action-btn secondary" data-action="unsave" data-id="${idea.id}">Unsave</button>`
        : `<button class="idea-action-btn secondary" data-action="save" data-id="${idea.id}">Save</button>`;
      actions = `
        <div class="idea-card-actions">
          <button class="idea-action-btn primary" data-action="grow" data-id="${idea.id}" data-seed="${escAttr(idea.seed_text)}">Grow this idea</button>
          ${saveOrFresh}
          <button class="idea-action-btn danger" data-action="discard" data-id="${idea.id}">Not for me</button>
        </div>`;
    }

    return `
      <article class="idea-card" data-id="${idea.id}">
        <div class="idea-card-badges">${funnelBadge}${archetypeBadge}</div>
        <p class="idea-card-text">${escHtml(idea.seed_text)}</p>
        ${idea.source_ref ? `<p class="idea-card-source">${escHtml(idea.source_ref)}</p>` : ''}
        ${actions}
      </article>`;
  }

  // ── Card actions ──────────────────────────────────────────────
  async function handleCardAction(e) {
    const btn    = e.currentTarget;
    const action = btn.dataset.action;
    const id     = Number(btn.dataset.id);

    if (action === 'grow') {
      const seed = btn.dataset.seed || '';
      // Navigate to generate.html with seed pre-filled and vault_idea_id
      const url = `/generate.html?vault_idea_id=${id}&seed=${encodeURIComponent(seed)}`;
      window.location.href = url;
      return;
    }

    const statusMap = { save: 'saved', unsave: 'fresh', discard: 'discarded', restore: 'fresh' };
    const newStatus = statusMap[action];
    if (!newStatus) return;

    try {
      const res  = await fetch(`/api/vault/ideas/${id}`, {
        method:  'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ status: newStatus }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);
      // Update local state
      const idea = allIdeas.find(i => i.id === id);
      if (idea) idea.status = newStatus;
      renderColumns();
    } catch (err) {
      console.error('[ideas] action failed:', err.message);
    }
  }

  // ── Utilities ─────────────────────────────────────────────────
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escAttr(str) {
    return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ── Init ──────────────────────────────────────────────────────
  loadFunnelHealth();
  loadIdeas();
