<!-- subject: Your post is live on LinkedIn -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:40px 0;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">
        <!-- Header -->
        <tr><td style="background:#0f172a;padding:28px 40px;">
          <p style="margin:0;font-size:20px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">ScoutHook</p>
        </td></tr>
        <!-- Success banner -->
        <tr><td style="background:#f0fdf4;border-bottom:1px solid #bbf7d0;padding:14px 40px;">
          <p style="margin:0;font-size:13px;font-weight:600;color:#16a34a;">✓ Your post is live</p>
        </td></tr>
        <!-- Body -->
        <tr><td style="padding:40px 40px 32px;">
          <p style="margin:0 0 20px;font-size:16px;color:#111827;">Hi {{name}},</p>
          <p style="margin:0 0 20px;font-size:16px;color:#374151;line-height:1.6;">Your scheduled post just published on LinkedIn.</p>

          <!-- Post preview -->
          <table width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;border:1px solid #e5e7eb;border-radius:6px;margin:0 0 28px;">
            <tr><td style="padding:16px 20px;">
              <p style="margin:0;font-size:14px;color:#374151;line-height:1.6;font-style:italic;">{{post_preview}}</p>
            </td></tr>
          </table>

          <table cellpadding="0" cellspacing="0">
            <tr>
              <td style="padding-right:12px;">
                <a href="{{linkedin_post_url}}" style="display:inline-block;background:#0a66c2;color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;padding:10px 20px;border-radius:6px;">View on LinkedIn →</a>
              </td>
              <td>
                <a href="{{app_url}}/generate.html" style="display:inline-block;background:#6366f1;color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;padding:10px 20px;border-radius:6px;">Check engagement →</a>
              </td>
            </tr>
          </table>

          <p style="margin:28px 0 0;font-size:14px;color:#6b7280;line-height:1.6;">Scheduled posts are a great way to stay consistent without being at your desk. Keep the queue full.</p>
        </td></tr>
        <!-- Footer -->
        <tr><td style="padding:20px 40px;border-top:1px solid #f3f4f6;">
          <p style="margin:0;font-size:12px;color:#9ca3af;">— ScoutHook</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
