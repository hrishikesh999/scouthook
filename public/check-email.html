<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScoutHook — Check your inbox</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/login.css" />
  <style>
    .pin-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 20px 0 8px;
    }
    .pin-digit {
      width: 44px;
      height: 52px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-heading);
      caret-color: var(--brand);
      outline: none;
      transition: border-color 0.15s;
    }
    .pin-digit:focus { border-color: var(--brand); }
    .pin-digit.is-error { border-color: var(--error, #dc2626); }
    .pin-error {
      color: var(--error, #dc2626);
      font-size: 13px;
      text-align: center;
      margin: 0 0 16px;
    }
  </style>
</head>
<body>
  <div class="login-split">
    <div class="login-left">
      <div class="login-left-inner">
        <img src="/images/scout-hook-logo.png" alt="ScoutHook" class="login-left-logo" />
        <h1 class="login-hero-headline">Check your inbox.</h1>
      </div>
    </div>
    <div class="login-right">
      <div class="login-right-inner">

        <!-- Signup PIN entry card -->
        <section id="card-signup" class="login-card" role="region" aria-label="Enter verification code" style="display:none">
          <div style="text-align:center;margin-bottom:20px;">
            <span style="font-size:48px;line-height:1;">📬</span>
          </div>
          <h2 style="font-size:18px;font-weight:700;color:var(--text-heading);margin:0 0 8px;text-align:center">
            Check your email
          </h2>
          <p id="pin-desc" style="font-size:14px;color:var(--text-muted);text-align:center;margin:0 0 4px;line-height:1.6"></p>

          <div id="use-code-notice" style="display:none;font-size:13px;color:var(--text-muted);text-align:center;margin:8px 0;background:var(--surface-alt,#f9fafb);border:1px solid var(--border);border-radius:6px;padding:8px 12px;">
            Verification codes have replaced email links. Enter the 6-digit code from your email below.
          </div>

          <!--
            Form submits as a real POST so the session cookie is set via
            the server's 302 redirect response — avoids fetch cookie timing issues.
          -->
          <form id="pinForm" method="POST" action="/auth/verify-email">
            <input type="hidden" name="email" id="emailInput" value="" />
            <input type="hidden" name="pin"   id="pinHidden"  value="" />

            <div class="pin-row" id="pinRow" aria-label="Verification code">
              <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1" />
              <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2" />
              <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3" />
              <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4" />
              <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5" />
              <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6" />
            </div>

            <p class="pin-error" id="pinError" style="display:none"></p>

            <button type="submit" id="verifyBtn" class="btn-primary login-continue-btn" style="width:100%;margin-bottom:14px" disabled>
              Verify
            </button>
          </form>

          <div style="text-align:center">
            <p style="font-size:13px;color:var(--text-muted);margin:0 0 10px">Didn't get it?</p>
            <button id="resendBtn" class="btn-secondary" style="width:100%">Resend code</button>
            <p id="resendStatus" style="font-size:12px;color:var(--text-muted);margin:10px 0 0;display:none"></p>
          </div>

          <p style="font-size:13px;color:var(--text-muted);text-align:center;margin:16px 0 0">
            <a href="/login.html" style="color:var(--brand)">Back to sign in</a>
          </p>
        </section>

        <!-- Password-reset card (unchanged) -->
        <section id="card-reset" class="login-card" role="region" aria-label="Check your inbox" style="display:none">
          <div style="text-align:center;margin-bottom:20px;">
            <span style="font-size:48px;line-height:1;">📬</span>
          </div>
          <h2 style="font-size:18px;font-weight:700;color:var(--text-heading);margin:0 0 10px;text-align:center">
            Check your inbox
          </h2>
          <p style="font-size:14px;color:var(--text-muted);text-align:center;margin:0 0 24px;line-height:1.6">
            If that email has an account, we've sent a password reset link. It expires in 1 hour.
          </p>
          <p style="font-size:13px;color:var(--text-muted);text-align:center;margin:16px 0 0">
            <a href="/login.html" style="color:var(--brand)">Back to sign in</a>
          </p>
        </section>

      </div>
    </div>
  </div>

  <script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const reason = params.get('reason');
    const email  = params.get('email') || '';
    const info   = params.get('info')  || '';
    const error  = params.get('error') || '';

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    if (reason === 'reset') {
      document.getElementById('card-reset').style.display = '';
      return;
    }

    // ── Signup PIN flow ──────────────────────────────────────────────────────
    document.getElementById('card-signup').style.display = '';

    // Pre-fill hidden email field so the form POST includes it
    document.getElementById('emailInput').value = email;

    const desc = document.getElementById('pin-desc');
    desc.innerHTML = email
      ? 'We sent a 6-digit code to <strong>' + escapeHtml(email) + '</strong>. Enter it below to activate your account.'
      : 'Enter the 6-digit code we sent to your email address.';

    if (info === 'use_code') {
      document.getElementById('use-code-notice').style.display = '';
    }

    // Show server-returned errors (from failed POST redirect)
    const pinError = document.getElementById('pinError');
    if (error) {
      const msg =
        error === 'invalid_code'         ? 'Incorrect or expired code — please try again or resend.' :
        error === 'verification_failed'  ? 'Verification failed. Please try again or resend the code.' :
        error === 'invalid_request'      ? 'Please enter all 6 digits.' :
                                           'Something went wrong. Please try again.';
      pinError.textContent  = msg;
      pinError.style.display = '';
      document.querySelectorAll('.pin-digit').forEach(d => d.classList.add('is-error'));
    }

    // ── PIN digit inputs ─────────────────────────────────────────────────────
    const digits    = Array.from(document.querySelectorAll('.pin-digit'));
    const verifyBtn = document.getElementById('verifyBtn');
    const pinHidden = document.getElementById('pinHidden');

    function getPin() { return digits.map(d => d.value).join(''); }

    function syncHiddenAndBtn() {
      const pin = getPin();
      pinHidden.value     = pin;
      verifyBtn.disabled  = pin.length < 6;
    }

    function clearError() {
      pinError.style.display = '';
      pinError.textContent   = '';
      digits.forEach(d => d.classList.remove('is-error'));
    }

    digits.forEach((input, i) => {
      input.addEventListener('input', () => {
        clearError();
        input.value = input.value.replace(/\D/g, '').slice(0, 1);
        if (input.value && i < digits.length - 1) digits[i + 1].focus();
        syncHiddenAndBtn();
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && i > 0) digits[i - 1].focus();
        if (e.key === 'ArrowLeft'  && i > 0)                digits[i - 1].focus();
        if (e.key === 'ArrowRight' && i < digits.length - 1) digits[i + 1].focus();
      });

      // Paste handler — distribute digits across boxes
      input.addEventListener('paste', e => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData)
          .getData('text').replace(/\D/g, '').slice(0, 6);
        pasted.split('').forEach((ch, j) => {
          if (digits[i + j]) digits[i + j].value = ch;
        });
        const next = Math.min(i + pasted.length, digits.length - 1);
        digits[next].focus();
        clearError();
        syncHiddenAndBtn();
      });
    });

    // Focus first digit on load (skip if there's an error — user should re-enter)
    if (!error) digits[0].focus();

    // ── Resend (still uses fetch — no session needed here) ───────────────────
    const resendBtn    = document.getElementById('resendBtn');
    const resendStatus = document.getElementById('resendStatus');

    resendBtn.addEventListener('click', async () => {
      resendBtn.disabled    = true;
      resendBtn.textContent = 'Sending…';
      try {
        await fetch('/auth/resend-verification', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email }),
        });
        resendStatus.textContent   = 'Sent! Check your inbox (and spam folder).';
        resendStatus.style.display = '';
      } catch {
        resendStatus.textContent   = 'Something went wrong. Please try again.';
        resendStatus.style.display = '';
      } finally {
        resendBtn.disabled    = false;
        resendBtn.textContent = 'Resend code';
      }
    });
  })();
  </script>
</body>
</html>
