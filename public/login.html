<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scouthook — Sign in</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>

  <div class="login-split">

    <!-- Left: dark branding panel -->
    <div class="login-left">
      <div class="login-left-inner">
        <img src="/images/scout-hook-logo.png" alt="Scouthook" class="login-left-logo" />
        <h1 class="login-hero-headline">Login to Scouthook</h1>
        <p class="login-hero-signup">
          New to Scouthook? <a href="/signup.html" class="login-signup-link">Sign up</a>
        </p>
      </div>
    </div>

    <!-- Right: sign-in panel -->
    <div class="login-right">
      <div class="login-right-inner">
        <section class="login-card" role="region" aria-label="Sign in">
          <div id="errorBox" class="login-error" hidden></div>
          <a href="/auth/google" class="google-btn">
            <span class="google-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" width="18" height="18">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.08 1.53 7.48 2.81l5.1-4.9C33.44 4.59 29.17 2.5 24 2.5 14.74 2.5 6.94 7.82 3.1 15.6l6.35 4.93C11.34 14.1 17.14 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.1 24.5c0-1.34-.12-2.63-.34-3.88H24v7.34h12.5c-.54 2.9-2.18 5.35-4.64 7.02v5.8h7.5c4.38-4.03 6.74-9.97 6.74-16.28z"/>
                <path fill="#FBBC05" d="M9.45 28.53c-.47-1.4-.74-2.9-.74-4.53s.27-3.13.74-4.53l-6.35-4.93C1.77 17.23 1 20.52 1 24s.77 6.77 2.1 9.46l6.35-4.93z"/>
                <path fill="#34A853" d="M24 45.5c5.17 0 9.5-1.7 12.66-4.62l-7.5-5.8c-2.08 1.4-4.74 2.23-5.16 2.23-6.86 0-12.66-4.6-14.55-11.03l-6.35 4.93C6.94 40.18 14.74 45.5 24 45.5z"/>
                <path fill="none" d="M1 1h46v46H1z"/>
              </svg>
            </span>
            <span>Login with Google</span>
          </a>
        </section>
      </div>
    </div>

  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const error  = params.get('error');
      if (error) {
        const box = document.getElementById('errorBox');
        if (box) {
          box.textContent =
            error === 'google_not_configured' ? 'Google sign-in is not configured on the server.' :
            error === 'oauth_failed'           ? 'Google sign-in failed. Please try again.' :
                                                 'Sign-in error. Please try again.';
          box.hidden = false;
        }
      }
    })();
  </script>

</body>
</html>
