<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScoutHook — Reset password</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
  <div class="login-split">
    <div class="login-left">
      <div class="login-left-inner">
        <img src="/images/scout-hook-logo.png" alt="ScoutHook" class="login-left-logo" />
        <h1 class="login-hero-headline">Choose a new password.</h1>
      </div>
    </div>
    <div class="login-right">
      <div class="login-right-inner">
        <section class="login-card" role="region" aria-label="Reset password">
          <div id="errorBox" class="login-error" hidden></div>
          <div id="successBox" style="display:none;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px;font-size:14px;color:#166534;margin-bottom:14px">
            Password updated! <a href="/dashboard.html" style="color:#166534;font-weight:600">Go to dashboard →</a>
          </div>

          <form id="resetForm" class="login-email-form" novalidate>
            <label class="login-email-label" for="rp-password">New password</label>
            <input id="rp-password" type="password" class="login-email-input" placeholder="At least 8 characters" autocomplete="new-password" required />

            <label class="login-email-label" for="rp-confirm" style="margin-top:10px">Confirm password</label>
            <input id="rp-confirm" type="password" class="login-email-input" placeholder="Repeat your new password" autocomplete="new-password" required />

            <button type="submit" id="rp-submit" class="btn-primary login-continue-btn" style="margin-top:14px;width:100%">
              Reset password
            </button>
          </form>

          <p style="font-size:13px;color:var(--text-muted);text-align:center;margin-top:14px">
            <a href="/login.html" style="color:var(--brand)">Back to sign in</a>
          </p>
        </section>
      </div>
    </div>
  </div>
  <script>
  (function () {
    const token    = new URLSearchParams(window.location.search).get('token') || '';
    const errorBox = document.getElementById('errorBox');
    const success  = document.getElementById('successBox');
    const form     = document.getElementById('resetForm');

    if (!token) {
      errorBox.textContent = 'This reset link is invalid or has expired. Please request a new one.';
      errorBox.hidden = false;
      form.style.display = 'none';
    }

    function showError(msg) { errorBox.textContent = msg; errorBox.hidden = false; }
    function clearError()   { errorBox.hidden = true; }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearError();

      const pw  = document.getElementById('rp-password').value;
      const pw2 = document.getElementById('rp-confirm').value;

      if (pw.length < 8)    return showError('Password must be at least 8 characters.');
      if (pw !== pw2)       return showError('Passwords don\'t match.');

      const btn = document.getElementById('rp-submit');
      btn.disabled    = true;
      btn.textContent = 'Resetting…';

      try {
        const res  = await fetch('/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, newPassword: pw }),
        });
        const data = await res.json();

        if (data.ok) {
          form.style.display   = 'none';
          success.style.display = '';
          if (data.redirect) setTimeout(() => { window.location.href = data.redirect; }, 1500);
          return;
        }

        const msgs = {
          password_too_short:       'Password must be at least 8 characters.',
          invalid_or_expired_token: null,
          reset_failed:             'Reset failed. Please try again.',
        };
        if (data.error === 'invalid_or_expired_token') {
          errorBox.innerHTML = 'This reset link has expired. Please <a href="/forgot-password.html" style="color:inherit;font-weight:600">request a new one</a>.';
          errorBox.hidden = false;
        } else {
          showError(msgs[data.error] || data.error || 'Reset failed. Please try again.');
        }
      } catch {
        showError('Network error. Please check your connection and try again.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Reset password';
      }
    });
  })();
  </script>
</body>
</html>
