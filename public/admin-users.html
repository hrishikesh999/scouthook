<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — ScoutHook Admin</title>
  <link rel="stylesheet" href="/css/scouthook.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>

  <div id="auth-screen" class="admin-auth">
    <div class="admin-auth__card card">
      <h2 class="admin-auth__title">ScoutHook Admin</h2>
      <div class="field"><label for="pw-input">Admin password</label><input type="password" id="pw-input" placeholder="ADMIN_PASSWORD" /></div>
      <div id="pw-error" class="admin-error-msg hidden"></div>
      <button id="pw-btn" class="btn btn--primary">Unlock</button>
    </div>
  </div>

  <div id="main" class="hidden">
    <nav class="admin-nav">
      <a href="/admin.html" class="admin-nav__brand"><img src="/images/sh-logo-dark.png" alt="ScoutHook" class="admin-nav__logo" /><span>Admin</span></a>
      <div class="admin-nav__links">
        <a href="/admin.html" class="admin-nav__link">Dashboard</a>
        <a href="/admin-users.html" class="admin-nav__link admin-nav__link--active">Users</a>
        <a href="/admin-feedback.html" class="admin-nav__link">Feedback</a>
        <a href="/admin-support.html" class="admin-nav__link">Support</a>
        <div class="admin-nav__sep"></div>
        <a href="/admin-settings.html" class="admin-nav__link">Settings</a>
        <a href="/admin-templates.html" class="admin-nav__link">Templates</a>
      </div>
      <div class="admin-nav__bottom">
        <a href="/admin-logout.html" class="admin-nav__logout">Log out</a>
      </div>
    </nav>

    <main class="container--wide admin-main">
      <h1 class="admin-page-title">Users</h1>

      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search by email or name…" />
        <button id="search-btn" class="btn btn--secondary">Search</button>
      </div>

      <div class="card card--scrollable">
        <table class="data-table" id="users-table">
          <thead>
            <tr>
              <th>Full Name</th>
              <th>Email</th>
              <th>Country</th>
              <th>Status</th>
              <th>Last Active</th>
              <th>Registered</th>
              <th>Posts</th>
            </tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="7" class="td-empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Slide-over panel -->
  <div class="slide-over" id="slide-over">
    <div class="slide-over__header">
      <div>
        <div id="so-name" class="slide-over__user-name"></div>
        <div id="so-email" class="slide-over__user-email"></div>
      </div>
      <button id="close-panel" class="btn btn--secondary btn--sm slide-over__close">✕ Close</button>
    </div>
    <div class="slide-over__body" id="so-body">
      <div class="loading-text">Loading…</div>
    </div>
  </div>

  <script>
    let adminPw = '';

    function init() {
      const saved = sessionStorage.getItem('adminPw');
      if (saved) { adminPw = saved; showMain(); return; }
    }

    document.getElementById('pw-btn').addEventListener('click', async () => {
      const pw = document.getElementById('pw-input').value;
      const r = await fetch('/admin/settings', { headers: { 'X-Admin-Password': pw } });
      if (r.status === 401) { document.getElementById('pw-error').textContent = 'Incorrect password.'; document.getElementById('pw-error').classList.remove('hidden'); return; }
      adminPw = pw; sessionStorage.setItem('adminPw', pw); showMain();
    });
    document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pw-btn').click(); });

    function showMain() {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('main').classList.remove('hidden');
      loadUsers();
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function relativeTime(iso) {
      if (!iso) return '—';
      const diff = Date.now() - new Date(iso).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 2) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      if (days < 30) return `${days}d ago`;
      return new Date(iso).toLocaleDateString();
    }

    function statusBadge(plan, status) {
      if (!status || status === 'free' || (!plan && !status)) return `<span class="badge badge--free">Free</span>`;
      if (status === 'active' && plan === 'pro') return `<span class="badge badge--pro">Pro</span>`;
      if (status === 'trialing') return `<span class="badge badge--trialing">Trialing</span>`;
      if (status === 'canceled') return `<span class="badge badge--canceled">Canceled</span>`;
      if (status === 'past_due') return `<span class="badge badge--pastdue">Past Due</span>`;
      return `<span class="badge badge--free">${esc(status)}</span>`;
    }

    async function loadUsers(search = '') {
      const params = search ? `?search=${encodeURIComponent(search)}` : '';
      const r = await fetch(`/admin/users${params}`, { headers: { 'X-Admin-Password': adminPw } });
      const data = await r.json();
      const tbody = document.getElementById('users-tbody');
      if (!data.ok || !data.users.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="td-empty">No users found.</td></tr>`;
        return;
      }
      tbody.innerHTML = data.users.map(u => `
        <tr data-uid="${esc(u.user_id)}">
          <td>${esc(u.display_name || '—')}</td>
          <td>${esc(u.email || '—')}</td>
          <td>${esc(u.country || '—')}</td>
          <td>${statusBadge(u.plan, u.status)}</td>
          <td>${relativeTime(u.last_active)}</td>
          <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</td>
          <td>${u.post_count ?? 0}</td>
        </tr>`).join('');
      tbody.querySelectorAll('tr[data-uid]').forEach(tr => {
        tr.addEventListener('click', () => openPanel(tr.dataset.uid));
      });
    }

    document.getElementById('search-btn').addEventListener('click', () => {
      loadUsers(document.getElementById('search-input').value.trim());
    });
    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('search-btn').click();
    });

    // ── Slide-over ────────────────────────────────────────────────────────────
    async function openPanel(userId) {
      document.getElementById('slide-over').classList.add('slide-over--open');
      document.getElementById('overlay').classList.add('overlay--visible');
      document.getElementById('so-body').innerHTML = '<div class="loading-text">Loading…</div>';

      const r = await fetch(`/admin/users/${encodeURIComponent(userId)}`, { headers: { 'X-Admin-Password': adminPw } });
      const data = await r.json();
      if (!data.ok) { document.getElementById('so-body').innerHTML = `<p class="save-error-msg">Failed to load.</p>`; return; }

      const { profile, subscription, workspaces, connections, profiles, recent_posts } = data;

      document.getElementById('so-name').textContent  = profile.display_name || '—';
      document.getElementById('so-email').textContent = profile.email || '—';

      const trialEnds = subscription?.trial_ends_at
        ? new Date(subscription.trial_ends_at).toLocaleDateString()
        : null;
      const periodEnd = subscription?.current_period_end
        ? new Date(subscription.current_period_end).toLocaleDateString()
        : null;

      document.getElementById('so-body').innerHTML = `
        <!-- Header info -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Profile</div>
          <div class="detail-row"><span class="detail-row__label">Country</span><span>${esc(profile.country || '—')}</span></div>
          <div class="detail-row"><span class="detail-row__label">Registered</span><span>${profile.created_at ? new Date(profile.created_at).toLocaleDateString() : '—'}</span></div>
          <div class="detail-row"><span class="detail-row__label">User ID</span><span class="mono-sm">${esc(profile.user_id)}</span></div>
        </div>

        <!-- Subscription -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Subscription</div>
          <div class="detail-row"><span class="detail-row__label">Plan</span><span>${statusBadge(subscription?.plan, subscription?.status)}</span></div>
          ${trialEnds ? `<div class="detail-row"><span class="detail-row__label">Trial ends</span><span>${trialEnds}</span></div>` : ''}
          ${periodEnd ? `<div class="detail-row"><span class="detail-row__label">Renewal</span><span>${periodEnd}</span></div>` : ''}
        </div>

        <!-- Trial extension -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Extend Trial</div>
          <div class="trial-extend-row">
            <input type="number" id="trial-days" value="7" min="1" max="90" class="trial-days-input" />
            <span class="trial-days-label">days</span>
            <button class="btn btn--primary btn--sm" id="extend-btn" data-uid="${esc(profile.user_id)}">Extend trial</button>
          </div>
          <div id="extend-msg" class="extend-msg"></div>
        </div>

        <!-- Workspaces -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Workspaces</div>
          ${workspaces.length ? workspaces.map(w => `
            <div class="detail-row">
              <span>${esc(w.name)}${w.deleted_at ? ' <span class="text-error-sm">[deleted]</span>' : ''}</span>
              <span class="text-xs-muted">${w.post_count} posts · ${w.member_count} members</span>
            </div>`).join('') : '<p class="empty-section-text">No workspaces.</p>'}
        </div>

        <!-- LinkedIn -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">LinkedIn Accounts</div>
          ${connections.length ? connections.map(c => `
            <div class="detail-row">
              <span>${esc(c.display_name || 'Unknown')}</span>
              <span class="text-xs-muted">${esc(c.account_type)} · expires ${c.expires_at ? new Date(c.expires_at).toLocaleDateString() : 'unknown'}</span>
            </div>`).join('') : '<p class="empty-section-text">No connections.</p>'}
        </div>

        <!-- Voice profile -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Voice Profiles</div>
          ${profiles.length ? profiles.map(p => `
            <div class="detail-row">
              <span>${esc(p.display_name || 'Profile')}</span>
              <span class="text-xs-muted">${p.voice_profile_completion_pct ?? 0}% complete · ${p.onboarding_complete ? 'onboarding done' : 'onboarding pending'}</span>
            </div>`).join('') : '<p class="empty-section-text">No profiles.</p>'}
        </div>

        <!-- Recent posts -->
        <div class="slide-over__section">
          <div class="slide-over__section-title">Recent Posts (last 10)</div>
          ${recent_posts.length ? recent_posts.map(p => `
            <div class="mini-post">
              <div class="mini-post__header">
                <span class="text-xs-muted">${p.archetype_used || '—'}</span>
                <span class="badge badge--${p.status === 'published' ? 'pro' : 'free'} badge--xs">${esc(p.status)}</span>
                <span class="text-xs-muted">${p.created_at ? new Date(p.created_at).toLocaleDateString() : ''}</span>
              </div>
              <div class="mini-post__content">${esc((p.content || '').slice(0, 100))}${(p.content || '').length > 100 ? '…' : ''}</div>
            </div>`).join('') : '<p class="empty-section-text">No posts yet.</p>'}
        </div>
      `;

      document.getElementById('extend-btn')?.addEventListener('click', async () => {
        const days = parseInt(document.getElementById('trial-days').value);
        const uid  = document.getElementById('extend-btn').dataset.uid;
        const msg  = document.getElementById('extend-msg');
        msg.style.display = 'block';
        msg.style.color = '#6B7280';
        msg.textContent = 'Extending…';
        const r = await fetch(`/admin/users/${encodeURIComponent(uid)}/extend-trial`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPw },
          body: JSON.stringify({ days }),
        });
        const data = await r.json();
        msg.style.color = data.ok ? 'var(--color-success, #0FA87F)' : 'var(--color-error)';
        msg.textContent = data.ok ? `Trial extended by ${days} day${days !== 1 ? 's' : ''}.` : (data.error || 'Failed.');
      });
    }

    function closePanel() {
      document.getElementById('slide-over').classList.remove('slide-over--open');
      document.getElementById('overlay').classList.remove('overlay--visible');
    }
    document.getElementById('close-panel').addEventListener('click', closePanel);
    document.getElementById('overlay').addEventListener('click', closePanel);

    init();
  </script>
</body>
</html>
