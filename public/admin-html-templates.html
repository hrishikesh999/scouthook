<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Templates — ScoutHook Admin</title>
  <link rel="stylesheet" href="/css/scouthook.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <script src="/js/admin-nav.js"></script>
  <style>
    .ht-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-md); }
    .ht-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    .ht-card__thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: var(--neutral-100); display: block; }
    .ht-card__body { padding: var(--space-sm) var(--space-md); }
    .ht-card__name { font-weight: 600; font-size: .95rem; margin-bottom: 2px; }
    .ht-card__meta { font-size: .8rem; color: var(--text-muted); display: flex; gap: var(--space-sm); align-items: center; flex-wrap: wrap; }
    .ht-card__actions { padding: var(--space-sm) var(--space-md); border-top: 1px solid var(--border); display: flex; gap: var(--space-sm); flex-wrap: wrap; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: .72rem; font-weight: 600; }
    .badge--active { background: #d1fae5; color: #065f46; }
    .badge--inactive { background: var(--neutral-100); color: var(--text-muted); }
    .badge--cat { background: #ede9fe; color: #5b21b6; }
    .thumb-placeholder { width: 100%; aspect-ratio: 1/1; background: var(--neutral-100); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: .8rem; }
  </style>
</head>
<body>

  <!-- Auth screen -->
  <div id="auth-screen" class="admin-auth">
    <div class="admin-auth__card card">
      <h2 class="admin-auth__title">ScoutHook Admin</h2>
      <div class="field"><label for="pw-input">Admin password</label><input type="password" id="pw-input" placeholder="ADMIN_PASSWORD" /></div>
      <div id="pw-error" class="admin-error-msg hidden"></div>
      <button id="pw-btn" class="btn btn--primary">Unlock</button>
    </div>
  </div>

  <!-- Main app -->
  <div id="main" class="hidden">
    <div id="admin-nav-container"></div>

    <main class="admin-main">
      <div class="admin-templates-body">

        <div class="admin-page-header">
          <div>
            <h1>HTML Templates</h1>
            <p class="text-muted admin-page-subtitle">Canva-designed templates rendered via Puppeteer. Users select, AI fills text slots, they adjust colors and images.</p>
          </div>
          <button id="add-btn" class="btn btn--primary">+ Add template</button>
        </div>

        <div id="template-grid" class="ht-grid">
          <div class="loading-text--padded">Loading…</div>
        </div>

      </div>
    </main>
  </div>

<script>
  let adminPw = '';

  // ── Auth ──────────────────────────────────────────────────────────────────

  const saved = sessionStorage.getItem('adminPw');
  if (saved) { adminPw = saved; showMain(); }

  document.getElementById('pw-btn').addEventListener('click', async () => {
    const pw = document.getElementById('pw-input').value.trim();
    const r = await fetch('/admin/html-templates', { headers: { 'X-Admin-Password': pw } });
    if (r.status === 401) {
      document.getElementById('pw-error').textContent = 'Wrong password';
      document.getElementById('pw-error').classList.remove('hidden');
      return;
    }
    adminPw = pw; sessionStorage.setItem('adminPw', pw); showMain();
  });
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('pw-btn').click();
  });

  function showMain() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    loadTemplates();
  }

  function adminFetch(path, opts = {}) {
    opts.headers = opts.headers || {};
    opts.headers['X-Admin-Password'] = adminPw;
    if (opts.body && !opts.headers['Content-Type']) {
      opts.headers['Content-Type'] = 'application/json';
    }
    return fetch(path, opts);
  }

  // ── Navigation ────────────────────────────────────────────────────────────

  document.getElementById('add-btn').addEventListener('click', () => {
    location.href = '/admin-html-template-form.html';
  });

  // ── Load templates ────────────────────────────────────────────────────────

  async function loadTemplates() {
    const grid = document.getElementById('template-grid');
    const r = await adminFetch('/admin/html-templates');
    const { templates } = await r.json();

    if (!templates || templates.length === 0) {
      grid.innerHTML = '<p class="text-muted" style="padding:var(--space-md)">No templates yet. Click "+ Add template" to create one.</p>';
      return;
    }

    grid.innerHTML = templates.map(t => {
      const thumbSrc = t.thumbnail_r2_key ? `/admin/html-templates/${t.id}/thumbnail` : null;
      const slots = t.slot_manifest?.slots ? Object.keys(t.slot_manifest.slots) : [];
      const escapedName = esc(t.name);
      return `
      <div class="ht-card" data-id="${t.id}" data-name="${escapedName}" data-active="${t.active}">
        ${thumbSrc
          ? `<img class="ht-card__thumb" src="${thumbSrc}" alt="${escapedName}" loading="lazy">`
          : `<div class="thumb-placeholder">No thumbnail</div>`}
        <div class="ht-card__body">
          <div class="ht-card__name">${escapedName}</div>
          <div class="ht-card__meta">
            <span class="badge ${t.active ? 'badge--active' : 'badge--inactive'}">${t.active ? 'Active' : 'Inactive'}</span>
            ${t.category ? `<span class="badge badge--cat">${esc(t.category)}</span>` : ''}
            <span>${slots.length} slot${slots.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
        <div class="ht-card__actions">
          <button class="btn btn--sm btn--secondary js-edit">Edit</button>
          <button class="btn btn--sm btn--secondary js-toggle">${t.active ? 'Deactivate' : 'Activate'}</button>
          ${!t.thumbnail_r2_key ? `<button class="btn btn--sm btn--secondary js-regen">⟳ Thumbnail</button>` : ''}
          <button class="btn btn--sm btn--danger js-delete">Delete</button>
        </div>
      </div>`;
    }).join('');

    // Event delegation — attach after innerHTML is set
    grid.querySelectorAll('.ht-card').forEach(card => {
      const { id, name, active } = card.dataset;

      card.querySelector('.js-edit').addEventListener('click', () => {
        location.href = `/admin-html-template-form.html?id=${id}`;
      });

      card.querySelector('.js-toggle').addEventListener('click', () => toggleTemplate(id));

      card.querySelector('.js-regen')?.addEventListener('click', e => regenThumb(id, e.currentTarget));

      card.querySelector('.js-delete').addEventListener('click', () => deleteTemplate(id, name));
    });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Template actions ──────────────────────────────────────────────────────

  async function toggleTemplate(id) {
    await adminFetch(`/admin/html-templates/${id}/toggle`, { method: 'POST' });
    loadTemplates();
  }

  async function regenThumb(id, btn) {
    btn.textContent = '⟳ Generating…'; btn.disabled = true;
    const r = await adminFetch(`/admin/html-templates/${id}/regenerate-thumbnail`, { method: 'POST' });
    const data = await r.json();
    if (data.ok) {
      loadTemplates();
    } else {
      alert('Thumbnail generation failed: ' + data.error);
      btn.textContent = '⟳ Thumbnail'; btn.disabled = false;
    }
  }

  async function deleteTemplate(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    await adminFetch(`/admin/html-templates/${id}`, { method: 'DELETE' });
    loadTemplates();
  }
</script>
</body>
</html>
