<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carousel Packs — ScoutHook Admin</title>
  <link rel="stylesheet" href="/css/scouthook.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <script src="/js/admin-nav.js"></script>
  <style>
    .cp-badge { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: .7rem; font-weight: 600; }
    .cp-badge--active { background: #d1fae5; color: #065f46; }
    .cp-badge--inactive { background: #f3f4f6; color: #6b7280; }
    .cp-badge--cat { background: #ede9fe; color: #5b21b6; }
    .cp-badge--slides { background: #dbeafe; color: #1e40af; }
    .slide-strip { display: flex; gap: 4px; margin-top: 6px; }
    .slide-strip__thumb { width: 48px; height: 48px; border-radius: 4px; border: 1px solid var(--border); object-fit: cover; background: var(--neutral-50); }
    .slide-strip__placeholder { width: 48px; height: 48px; border-radius: 4px; border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; font-size: .6rem; color: var(--text-muted); background: var(--neutral-50); }
    .slide-strip__role { font-size: .55rem; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: var(--text-muted); text-align: center; margin-top: 2px; }
  </style>
</head>
<body>

  <div id="auth-screen" class="admin-auth">
    <div class="admin-auth__card card">
      <h2 class="admin-auth__title">ScoutHook Admin</h2>
      <div class="field"><label for="pw-input">Admin password</label><input type="password" id="pw-input" placeholder="ADMIN_PASSWORD" /></div>
      <div id="pw-error" class="admin-error-msg hidden"></div>
      <button id="pw-btn" class="btn btn--primary">Unlock</button>
    </div>
  </div>

  <div id="main" class="hidden">
    <div id="admin-nav-container"></div>

    <main class="admin-main">
      <div class="admin-templates-body">

        <div class="admin-page-header">
          <div>
            <h1>Carousel Packs</h1>
            <p class="text-muted admin-page-subtitle">Upload slide images from Canva. AI converts each into an HTML template and groups them as a multi-slide carousel pack.</p>
          </div>
          <button id="add-btn" class="btn btn--primary">+ Add carousel pack</button>
        </div>

        <div class="card card--section" id="pack-list">
          <div class="loading-text--padded">Loading...</div>
        </div>

      </div>
    </main>
  </div>

<script>
  let adminPw = '';

  const saved = sessionStorage.getItem('adminPw');
  if (saved) { adminPw = saved; showMain(); }

  document.getElementById('pw-btn').addEventListener('click', async () => {
    const pw = document.getElementById('pw-input').value.trim();
    const r = await fetch('/admin/carousel-packs', { headers: { 'X-Admin-Password': pw } });
    if (r.status === 401) {
      document.getElementById('pw-error').textContent = 'Wrong password';
      document.getElementById('pw-error').classList.remove('hidden');
      return;
    }
    adminPw = pw; sessionStorage.setItem('adminPw', pw); showMain();
  });
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('pw-btn').click();
  });

  function showMain() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    loadPacks();
  }

  function adminFetch(path, opts = {}) {
    opts.headers = opts.headers || {};
    opts.headers['X-Admin-Password'] = adminPw;
    if (opts.body && !opts.headers['Content-Type']) opts.headers['Content-Type'] = 'application/json';
    return fetch(path, opts);
  }

  document.getElementById('add-btn').addEventListener('click', () => {
    location.href = '/admin-carousel-pack-form.html';
  });

  async function loadPacks() {
    const list = document.getElementById('pack-list');
    const r = await adminFetch('/admin/carousel-packs');
    const { packs } = await r.json();

    if (!packs || packs.length === 0) {
      list.innerHTML = '<p class="text-muted loading-text--padded">No carousel packs yet. Click "+ Add carousel pack" to create one.</p>';
      return;
    }

    list.innerHTML = packs.map(p => {
      const slideCount = (p.slides || []).length;
      return `
      <div class="template-row" data-id="${p.id}" data-name="${esc(p.name)}" data-active="${p.active}">
        <div style="min-width:200px">
          <div class="slide-strip">
            ${(p.slides || []).slice(0, 5).map(s => `
              <div style="display:flex;flex-direction:column;align-items:center">
                ${s.template_thumbnail
                  ? `<img class="slide-strip__thumb" data-thumb-url="/admin/html-templates/${s.template_id}/thumbnail" alt="${esc(s.role)}">`
                  : `<div class="slide-strip__placeholder">${esc(s.role.slice(0, 1).toUpperCase())}</div>`}
                <div class="slide-strip__role">${esc(s.role)}</div>
              </div>`).join('')}
            ${slideCount > 5 ? `<div class="slide-strip__placeholder">+${slideCount - 5}</div>` : ''}
          </div>
        </div>
        <div class="template-row__info" style="flex:1">
          <div class="template-row__name">${esc(p.name)}</div>
          <div class="template-row__meta" style="margin-top:4px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <span class="cp-badge ${p.active ? 'cp-badge--active' : 'cp-badge--inactive'}">${p.active ? 'Active' : 'Inactive'}</span>
            <span class="cp-badge cp-badge--slides">${slideCount} slide${slideCount !== 1 ? 's' : ''}</span>
            ${p.category ? `<span class="cp-badge cp-badge--cat">${esc(p.category)}</span>` : ''}
          </div>
          ${p.description ? `<div class="template-row__meta" style="margin-top:2px">${esc(p.description)}</div>` : ''}
        </div>
        <div class="template-row__actions">
          <button class="btn btn--secondary btn--sm js-edit">Edit</button>
          <button class="btn btn--secondary btn--sm js-toggle">${p.active ? 'Deactivate' : 'Activate'}</button>
          <button class="btn btn--secondary btn--sm btn--danger js-delete">Delete</button>
        </div>
      </div>`;
    }).join('');

    // Wire events
    list.querySelectorAll('.template-row').forEach(row => {
      const { id, name } = row.dataset;
      row.querySelector('.js-edit').addEventListener('click', () => {
        location.href = `/admin-carousel-pack-form.html?id=${id}`;
      });
      row.querySelector('.js-toggle').addEventListener('click', () => togglePack(id));
      row.querySelector('.js-delete').addEventListener('click', () => deletePack(id, name));
    });

    // Load slide thumbnails
    list.querySelectorAll('.slide-strip__thumb[data-thumb-url]').forEach(async (img) => {
      try {
        const r = await adminFetch(img.dataset.thumbUrl);
        if (!r.ok) throw new Error();
        const blob = await r.blob();
        img.src = URL.createObjectURL(blob);
      } catch {
        const ph = document.createElement('div');
        ph.className = 'slide-strip__placeholder';
        ph.textContent = (img.alt || '?').slice(0, 1).toUpperCase();
        img.replaceWith(ph);
      }
    });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function togglePack(id) {
    await adminFetch(`/admin/carousel-packs/${id}/toggle`, { method: 'POST' });
    loadPacks();
  }

  async function deletePack(id, name) {
    if (!confirm(`Delete carousel pack "${name}"? Templates will NOT be deleted.`)) return;
    await adminFetch(`/admin/carousel-packs/${id}`, { method: 'DELETE' });
    loadPacks();
  }
</script>
</body>
</html>
