<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback — ScoutHook Admin</title>
  <link rel="stylesheet" href="/css/scouthook.css" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <script src="/js/admin-nav.js"></script>
</head>
<body>

  <div id="auth-screen" class="admin-auth">
    <div class="admin-auth__card card">
      <h2 class="admin-auth__title">ScoutHook Admin</h2>
      <div class="field"><label for="pw-input">Admin password</label><input type="password" id="pw-input" placeholder="ADMIN_PASSWORD" /></div>
      <div id="pw-error" class="admin-error-msg hidden"></div>
      <button id="pw-btn" class="btn btn--primary">Unlock</button>
    </div>
  </div>

  <div id="main" class="hidden">
    <div id="admin-nav-container"></div>

    <main class="container--wide admin-main">
      <h1 class="admin-page-title">Feedback</h1>

      <div class="filter-bar">
        <button class="btn btn--secondary btn--active" data-cat="">All</button>
        <button class="btn btn--secondary" data-cat="feature_request">Feature Requests</button>
        <button class="btn btn--secondary" data-cat="bug_report">Bug Reports</button>
        <button class="btn btn--secondary" data-cat="improvement">Improvements</button>
        <span id="count-label" class="filter-bar__count"></span>
      </div>

      <div class="card card--scrollable">
        <table class="data-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Category</th>
              <th>Rating</th>
              <th>Message</th>
              <th>Page</th>
              <th>Submitted</th>
            </tr>
          </thead>
          <tbody id="feedback-tbody">
            <tr><td colspan="7" class="td-empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay"></div>

  <!-- Slide-over panel -->
  <div class="slide-over" id="slide-over">
    <div class="slide-over__header">
      <div>
        <div id="so-name" class="slide-over__user-name"></div>
        <div id="so-email" class="slide-over__user-email"></div>
      </div>
      <button id="close-panel" class="btn btn--secondary btn--sm slide-over__close">✕ Close</button>
    </div>
    <div class="slide-over__body" id="so-body">
      <div class="loading-text">Loading…</div>
    </div>
  </div>

  <script>
    let adminPw = '';
    let allFeedback = [];

    function init() {
      const saved = sessionStorage.getItem('adminPw');
      if (saved) { adminPw = saved; showMain(); return; }
    }

    document.getElementById('pw-btn').addEventListener('click', async () => {
      const pw = document.getElementById('pw-input').value;
      const r = await fetch('/admin/settings', { headers: { 'X-Admin-Password': pw } });
      if (r.status === 401) { document.getElementById('pw-error').textContent = 'Incorrect password.'; document.getElementById('pw-error').classList.remove('hidden'); return; }
      adminPw = pw; sessionStorage.setItem('adminPw', pw); showMain();
    });
    document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pw-btn').click(); });

    function showMain() {
      document.getElementById('auth-screen').classList.add('hidden');
      document.getElementById('main').classList.remove('hidden');
      loadFeedback('');
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function catBadge(cat) {
      if (cat === 'feature_request') return `<span class="badge badge--feature">Feature Request</span>`;
      if (cat === 'bug_report')      return `<span class="badge badge--bug">Bug Report</span>`;
      if (cat === 'improvement')     return `<span class="badge badge--improve">Improvement</span>`;
      return `<span class="badge badge--other">${esc(cat || 'Other')}</span>`;
    }

    function stars(n) {
      if (!n) return '—';
      return '<span class="stars">' + '★'.repeat(Math.min(5, n)) + '</span>';
    }

    async function loadFeedback(category) {
      const params = category ? `?category=${encodeURIComponent(category)}` : '';
      const r = await fetch(`/admin/feedback${params}`, { headers: { 'X-Admin-Password': adminPw } });
      const data = await r.json();
      allFeedback = data.feedback || [];
      document.getElementById('count-label').textContent = `Count: ${allFeedback.length}`;
      renderFeedback();
    }

    function renderFeedback() {
      const tbody = document.getElementById('feedback-tbody');
      if (!allFeedback.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="td-empty">No feedback found.</td></tr>`;
        return;
      }
      tbody.innerHTML = allFeedback.map(f => `
        <tr class="clickable" data-id="${f.id}">
          <td>${esc(f.display_name || '—')}</td>
          <td>${esc(f.email || '—')}</td>
          <td>${catBadge(f.category)}</td>
          <td>${stars(f.rating)}</td>
          <td class="td-truncate">${esc((f.message||'').slice(0,80))}${(f.message||'').length > 80 ? '…' : ''}</td>
          <td class="td-truncate-sm">${esc(f.page_url || '—')}</td>
          <td class="td-nowrap">${f.created_at ? new Date(f.created_at).toLocaleDateString() : '—'}</td>
        </tr>`).join('');
      tbody.querySelectorAll('tr.clickable').forEach(tr => {
        tr.addEventListener('click', () => openPanel(parseInt(tr.dataset.id)));
      });
    }

    // ── Slide-over ────────────────────────────────────────────────────────────
    async function openPanel(id) {
      document.getElementById('slide-over').classList.add('slide-over--open');
      document.getElementById('overlay').classList.add('overlay--visible');
      document.getElementById('so-body').innerHTML = '<div class="loading-text loading-text--padded">Loading…</div>';

      const r = await fetch(`/admin/feedback/${id}`, { headers: { 'X-Admin-Password': adminPw } });
      const data = await r.json();
      if (!data.ok) { document.getElementById('so-body').innerHTML = `<p class="save-error-msg">Failed to load.</p>`; return; }

      renderPanel(data.feedback);
    }

    function renderPanel(f) {
      document.getElementById('so-name').textContent  = f.display_name || '—';
      document.getElementById('so-email').textContent = f.email || '—';

      const savedFrom = sessionStorage.getItem('feedbackFromEmail') || '';

      document.getElementById('so-body').innerHTML = `
        <div class="slide-over__section">
          <div class="slide-over__section-title">Feedback Details</div>
          <div class="detail-row"><span class="detail-row__label">Category</span><span>${catBadge(f.category)}</span></div>
          <div class="detail-row"><span class="detail-row__label">Rating</span><span>${stars(f.rating) || '—'}</span></div>
          ${f.page_url ? `<div class="detail-row"><span class="detail-row__label">Page</span><span class="text-xs-muted">${esc(f.page_url)}</span></div>` : ''}
          <div class="detail-row"><span class="detail-row__label">Submitted</span><span>${f.created_at ? new Date(f.created_at).toLocaleDateString() : '—'}</span></div>
        </div>

        <div class="slide-over__section">
          <div class="slide-over__section-title">Message</div>
          <div class="expand-body">${esc(f.message || '')}</div>
        </div>

        <div class="slide-over__section">
          <div class="slide-over__section-title">Reply to User</div>
          <div class="field field--mb-sm">
            <label for="reply-from">From email (Reply-To)</label>
            <input type="email" id="reply-from" placeholder="admin@example.com" value="${esc(savedFrom)}" />
          </div>
          <div class="field field--mb-sm">
            <textarea id="reply-body" rows="5" placeholder="Type your reply…" class="reply-textarea"></textarea>
          </div>
          <div class="ticket-detail__reply-actions">
            <span id="reply-msg" class="reply-msg"></span>
            <button class="btn btn--primary" id="send-reply-btn" data-id="${f.id}">Send Reply</button>
          </div>
        </div>
      `;

      document.getElementById('send-reply-btn').addEventListener('click', async () => {
        const msg       = document.getElementById('reply-body').value.trim();
        const fromEmail = document.getElementById('reply-from').value.trim();
        const msgEl     = document.getElementById('reply-msg');
        if (!msg) { msgEl.style.color = 'var(--color-error)'; msgEl.textContent = 'Reply cannot be empty.'; return; }
        msgEl.style.color = '#6B7280'; msgEl.textContent = 'Sending…';
        if (fromEmail) sessionStorage.setItem('feedbackFromEmail', fromEmail);
        const r = await fetch(`/admin/feedback/${f.id}/reply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPw },
          body: JSON.stringify({ message: msg, fromEmail: fromEmail || undefined }),
        });
        const data = await r.json();
        if (data.ok) {
          msgEl.style.color = 'var(--color-success, #0FA87F)';
          msgEl.textContent = 'Reply sent.';
          document.getElementById('reply-body').value = '';
        } else {
          msgEl.style.color = 'var(--color-error)';
          msgEl.textContent = data.error || 'Failed to send.';
        }
      });
    }

    function closePanel() {
      document.getElementById('slide-over').classList.remove('slide-over--open');
      document.getElementById('overlay').classList.remove('overlay--visible');
    }
    document.getElementById('close-panel').addEventListener('click', closePanel);
    document.getElementById('overlay').addEventListener('click', closePanel);

    document.querySelectorAll('[data-cat]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('btn--active'));
        btn.classList.add('btn--active');
        loadFeedback(btn.dataset.cat);
      });
    });

    init();
  </script>
</body>
</html>
