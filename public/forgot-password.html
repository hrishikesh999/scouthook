<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScoutHook — Forgot password</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
  <div class="login-split">
    <div class="login-left">
      <div class="login-left-inner">
        <img src="/images/scout-hook-logo.png" alt="ScoutHook" class="login-left-logo" />
        <h1 class="login-hero-headline">Reset your password.</h1>
        <p class="login-hero-signup">
          <a href="/login.html" class="login-signup-link">Back to sign in</a>
        </p>
      </div>
    </div>
    <div class="login-right">
      <div class="login-right-inner">
        <section class="login-card" role="region" aria-label="Forgot password">
          <p style="font-size:14px;color:var(--text-muted);margin:0 0 20px;line-height:1.6">
            Enter the email address associated with your account and we'll send a reset link.
          </p>
          <div id="errorBox" class="login-error" hidden></div>

          <form id="fpForm" class="login-email-form" novalidate>
            <label class="login-email-label" for="fp-email">Email</label>
            <input id="fp-email" type="email" class="login-email-input" placeholder="you@example.com" autocomplete="email" required />
            <button type="submit" id="fp-submit" class="btn-primary login-continue-btn" style="margin-top:14px;width:100%">
              Send reset link
            </button>
          </form>
        </section>
      </div>
    </div>
  </div>
  <script>
  (function () {
    const errorBox = document.getElementById('errorBox');
    function showError(msg) { errorBox.textContent = msg; errorBox.hidden = false; }
    function clearError()   { errorBox.hidden = true; }

    document.getElementById('fpForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      clearError();
      const email = document.getElementById('fp-email').value.trim();
      if (!email) return showError('Enter your email address.');

      const btn = document.getElementById('fp-submit');
      btn.disabled    = true;
      btn.textContent = 'Sending…';

      try {
        const res  = await fetch('/auth/forgot-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email }),
        });
        const data = await res.json();
        if (data.redirect) { window.location.href = data.redirect + '&email=' + encodeURIComponent(email); return; }
      } catch {
        showError('Network error. Please check your connection and try again.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Send reset link';
      }
    });
  })();
  </script>
</body>
</html>
