<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScoutHook — Create account</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>

  <div class="login-split">

    <!-- Left: dark branding panel -->
    <div class="login-left">
      <div class="login-left-inner">
        <img src="/images/scout-hook-logo.png" alt="ScoutHook" class="login-left-logo" />
        <h1 class="login-hero-headline">Join ScoutHook</h1>
        <p class="login-hero-signup">
          Already have an account? <a href="/login.html" class="login-signup-link">Sign in</a>
        </p>
      </div>
    </div>

    <!-- Right: sign-up panel -->
    <div class="login-right">
      <div class="login-right-inner">
        <section class="login-card" role="region" aria-label="Create account">
          <div id="errorBox" class="login-error" hidden></div>

          <!-- Google sign-up -->
          <a href="/auth/google" class="google-btn">
            <span class="google-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" width="18" height="18">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.08 1.53 7.48 2.81l5.1-4.9C33.44 4.59 29.17 2.5 24 2.5 14.74 2.5 6.94 7.82 3.1 15.6l6.35 4.93C11.34 14.1 17.14 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.1 24.5c0-1.34-.12-2.63-.34-3.88H24v7.34h12.5c-.54 2.9-2.18 5.35-4.64 7.02v5.8h7.5c4.38-4.03 6.74-9.97 6.74-16.28z"/>
                <path fill="#FBBC05" d="M9.45 28.53c-.47-1.4-.74-2.9-.74-4.53s.27-3.13.74-4.53l-6.35-4.93C1.77 17.23 1 20.52 1 24s.77 6.77 2.1 9.46l6.35-4.93z"/>
                <path fill="#34A853" d="M24 45.5c5.17 0 9.5-1.7 12.66-4.62l-7.5-5.8c-2.08 1.4-4.74 2.23-5.16 2.23-6.86 0-12.66-4.6-14.55-11.03l-6.35 4.93C6.94 40.18 14.74 45.5 24 45.5z"/>
                <path fill="none" d="M1 1h46v46H1z"/>
              </svg>
            </span>
            <span>Sign up with Google</span>
          </a>

          <!-- Or divider -->
          <div style="display:flex;align-items:center;gap:10px;margin:18px 0;">
            <hr style="flex:1;border:none;border-top:1px solid var(--border);margin:0;">
            <span style="font-size:12px;color:var(--text-muted);white-space:nowrap;">or</span>
            <hr style="flex:1;border:none;border-top:1px solid var(--border);margin:0;">
          </div>

          <!-- Email / password sign-up -->
          <form id="signupForm" class="login-email-form" novalidate>
            <label class="login-email-label" for="su-name">Name</label>
            <input id="su-name" type="text" class="login-email-input" placeholder="Your name" autocomplete="name" required />

            <label class="login-email-label" for="su-email" style="margin-top:10px">Email</label>
            <input id="su-email" type="email" class="login-email-input" placeholder="you@example.com" autocomplete="email" required />

            <label class="login-email-label" for="su-password" style="margin-top:10px">Password</label>
            <input id="su-password" type="password" class="login-email-input" placeholder="At least 8 characters" autocomplete="new-password" required />

            <button type="submit" id="su-submit" class="btn-primary login-continue-btn" style="margin-top:14px;width:100%">
              Create account
            </button>
          </form>

          <p class="login-tagline">Free to start. No credit card needed.</p>
          <p class="login-meta">
            By continuing you agree to our
            <a href="/terms.html" style="color:var(--text-muted)">Terms</a> and
            <a href="/privacy.html" style="color:var(--text-muted)">Privacy Policy</a>.
          </p>
        </section>
      </div>
    </div>

  </div>

  <script>
  (function () {
    const errorBox = document.getElementById('errorBox');

    // Show URL-based error params (e.g. from OAuth redirect)
    const params = new URLSearchParams(window.location.search);
    const urlError = params.get('error');
    if (urlError) {
      const msg =
        urlError === 'google_not_configured' ? 'Google sign-in is not configured on the server.' :
        urlError === 'oauth_failed'          ? 'Google sign-in failed. Please try again.' :
                                               'Sign-in error. Please try again.';
      errorBox.textContent = msg;
      errorBox.hidden = false;
    }

    function showError(msg) { errorBox.textContent = msg; errorBox.hidden = false; }
    function clearError()   { errorBox.hidden = true; }

    const ERROR_MESSAGES = {
      name_required:            'Please enter your name.',
      invalid_email:            'Enter a valid email address.',
      password_too_short:       'Password must be at least 8 characters.',
      email_already_registered: 'This email is already registered. Try <a href="/login.html">signing in</a>.',
      signup_failed:            'Sign up failed. Please try again.',
    };

    document.getElementById('signupForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      clearError();

      const name     = document.getElementById('su-name').value.trim();
      const email    = document.getElementById('su-email').value.trim();
      const password = document.getElementById('su-password').value;

      if (!name)                return showError('Please enter your name.');
      if (!email)               return showError('Enter a valid email address.');
      if (password.length < 8)  return showError('Password must be at least 8 characters.');

      const btn = document.getElementById('su-submit');
      btn.disabled    = true;
      btn.textContent = 'Creating account…';

      try {
        const res  = await fetch('/auth/signup', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name, email, password }),
        });
        const data = await res.json();

        if (data.ok && data.redirect) {
          window.location.href = data.redirect;
          return;
        }

        const rawMsg = ERROR_MESSAGES[data.error] || data.error || 'Sign up failed. Please try again.';
        errorBox.innerHTML = rawMsg;
        errorBox.hidden = false;
      } catch {
        showError('Network error. Please check your connection and try again.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Create account';
      }
    });
  })();
  </script>

</body>
</html>
