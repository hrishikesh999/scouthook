<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Scouthook</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body style="display: block; width: 100%; margin: 0; background:
  radial-gradient(900px 500px at 20% 20%, rgba(16,185,129,0.25), transparent 55%),
  radial-gradient(700px 450px at 80% 30%, rgba(15,118,110,0.22), transparent 60%),
  linear-gradient(135deg, #061B1A 0%, #0B1220 55%, #061B1A 100%);">

  <main style="min-height: 100vh; width: 100%; display:flex; align-items:center; justify-content:center; padding: 40px 16px;">
    <div style="width: 100%; max-width: 520px; text-align:center;">
      <!-- Logo above card -->
      <img
        src="/images/scout-hook-logo.png"
        alt="ScoutHook"
        style="width: 168px; height: 168px; object-fit: contain; margin: 0 auto 18px; display:block;"
      />

      <!-- Card -->
      <div style="background: rgba(255,255,255,0.95); border: 1px solid rgba(255,255,255,0.14); border-radius: 18px; box-shadow: var(--shadow-md); padding: 26px; text-align:left; backdrop-filter: blur(8px);">
        <h1 style="margin: 0 0 8px; font-size: 26px; letter-spacing: -0.03em; color: var(--text-heading);">
          Sign in to continue
        </h1>
        <p style="margin: 0 0 18px; color: var(--text-muted); line-height: 1.6; font-size: 14px;">
          Sign in with LinkedIn to save drafts and personalize your writing suggestions.
          Posting happens manually on LinkedIn via copy/paste.
        </p>

        <button
          id="signin-btn"
          style="
            width: 100%;
            height: 44px;
            border: none;
            border-radius: 12px;
            background: var(--brand);
            color: white;
            font-weight: 700;
            cursor: pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            gap: 10px;
            box-shadow: var(--shadow-sm);
          "
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#FFFFFF" aria-hidden="true">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
          Sign in with LinkedIn
        </button>

        <p id="err" style="display:none; margin: 12px 0 0; color: #b91c1c; font-size: 13px;"></p>

        <div style="display:flex; justify-content: space-between; align-items:center; gap: 12px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border);">
          <a href="/privacy.html" style="color: var(--text-muted); text-decoration: none; font-size: 13px;">Privacy</a>
          <a href="/terms.html" style="color: var(--text-muted); text-decoration: none; font-size: 13px;">Terms</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    // In review-mode, /api/linkedin/connect uses OIDC scopes only.
    document.getElementById('signin-btn').addEventListener('click', () => {
      try {
        window.location.href = '/api/linkedin/connect';
      } catch (e) {
        const el = document.getElementById('err');
        el.style.display = '';
        el.textContent = 'Could not start sign-in. Please refresh and try again.';
      }
    });

    // Hover state without additional CSS.
    const btn = document.getElementById('signin-btn');
    btn.addEventListener('mouseenter', () => {
      btn.style.background = getComputedStyle(document.documentElement).getPropertyValue('--brand-hover').trim() || '#115E59';
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.background = getComputedStyle(document.documentElement).getPropertyValue('--brand').trim() || '#0F766E';
    });
  </script>
</body>
</html>
