<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule — Scouthook</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

  <script src="/js/cached-fetch.js"></script>
  <script src="/js/sidebar.js"></script>

  <!-- ── Main content ──────────────────────────────────────── -->
  <div id="main-content">

    <!-- ── Schedule stream ─────────────────────────────────── -->
    <div class="schedule-page">
      <nav class="account-tabs" aria-label="Posts">
        <a href="/drafts.html" class="account-tab">Drafts</a>
        <a href="/schedule.html" class="account-tab active" aria-current="page">Scheduled</a>
        <a href="/published.html" class="account-tab">Published</a>
      </nav>

      <div class="schedule-header page-header">
        <div>
          <h1 class="schedule-title">Schedule</h1>
          <p class="schedule-subtitle">Your editorial agenda for the next 7 days.</p>
        </div>
      </div>

      <div id="schedule-stream" aria-live="polite">
        <div class="skeleton-pulse" aria-hidden="true" style="display:flex;flex-direction:column;gap:10px">
          <div class="skeleton-sched-day">
            <div class="skeleton-sched-aside">
              <div class="skeleton-line" style="width:28px;height:9px;margin:0"></div>
              <div class="skeleton-circle" style="width:44px;height:44px"></div>
              <div class="skeleton-line" style="width:24px;height:9px;margin:0"></div>
            </div>
            <div class="skeleton-sched-content">
              <div class="skeleton-sched-event">
                <div class="skeleton-sched-time"></div>
                <div class="skeleton-sched-body">
                  <div style="display:flex;gap:6px">
                    <div class="skeleton-badge" style="width:64px"></div>
                  </div>
                  <div class="skeleton-line" style="width:80%;margin:0"></div>
                  <div class="skeleton-line" style="width:50%;height:12px;margin:0"></div>
                </div>
              </div>
            </div>
          </div>
          <div class="skeleton-sched-day" style="opacity:0.68">
            <div class="skeleton-sched-aside">
              <div class="skeleton-line" style="width:24px;height:9px;margin:0"></div>
              <div class="skeleton-circle" style="width:44px;height:44px"></div>
              <div class="skeleton-line" style="width:24px;height:9px;margin:0"></div>
            </div>
            <div class="skeleton-sched-content" style="display:flex;align-items:center;justify-content:center;min-height:60px">
              <div class="skeleton-line" style="width:120px;height:12px;margin:0"></div>
            </div>
          </div>
          <div class="skeleton-sched-day" style="opacity:0.68">
            <div class="skeleton-sched-aside">
              <div class="skeleton-line" style="width:20px;height:9px;margin:0"></div>
              <div class="skeleton-circle" style="width:44px;height:44px"></div>
              <div class="skeleton-line" style="width:24px;height:9px;margin:0"></div>
            </div>
            <div class="skeleton-sched-content" style="display:flex;align-items:center;justify-content:center;min-height:60px">
              <div class="skeleton-line" style="width:110px;height:12px;margin:0"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="app-footer" role="contentinfo">
      <div class="app-footer-inner">
        <a href="https://www.scouthook.com/privacy" target="_blank" rel="noopener">Privacy Policy</a>
        <span class="app-footer-sep">|</span>
        <a href="https://www.scouthook.com/terms" target="_blank" rel="noopener">Terms of Service</a>
        <span class="app-footer-sep">|</span>
        <a href="/help.html">Help</a>
        <p class="app-footer-legal">&copy; 2026 CopyPower Digital LLP. ScoutHook is an AI-powered authority engine.</p>
      </div>
    </footer>

  </div><!-- /main-content -->

  <script src="/js/session.js"></script>
  <script src="/js/ui-toast.js"></script>
  <script src="/js/account-bar.js"></script>
  <script src="/js/app-router.js"></script>
  <script src="/js/schedule.js"></script>
</body>
</html>
