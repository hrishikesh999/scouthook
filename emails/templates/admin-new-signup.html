<!-- subject: New ScoutHook signup: {{name}} -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; font-size: 15px; color: #111; margin: 0; padding: 0; }
    .wrap { max-width: 520px; margin: 40px auto; padding: 0 24px; }
    .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 2px; }
    .value { font-size: 15px; color: #111; margin-bottom: 16px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .email-badge { background: #e0f2fe; color: #0369a1; }
    .google-badge { background: #fef9c3; color: #854d0e; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
    .footer { font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="wrap">
    <p>A new user just signed up on ScoutHook.</p>
    <hr>
    <div class="label">Name</div>
    <div class="value">{{name}}</div>
    <div class="label">Email</div>
    <div class="value">{{email}}</div>
    <div class="label">Method</div>
    <div class="value">
      <span class="badge {{method}}-badge">{{method}}</span>
    </div>
    <div class="label">Time</div>
    <div class="value">{{date}}</div>
    <hr>
    <p class="footer">ScoutHook internal notification — do not reply to this email.</p>
  </div>
</body>
</html>
