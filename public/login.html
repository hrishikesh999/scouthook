<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScoutHook — Sign in</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/login.css" />
</head>
<body>

  <div class="login-split">

    <!-- Left: dark branding panel -->
    <div class="login-left">
      <div class="login-left-inner">
        <img src="/images/scout-hook-logo.png" alt="ScoutHook" class="login-left-logo" />
        <h1 class="login-hero-headline">Login to ScoutHook</h1>
        <p class="login-hero-signup">
          New to ScoutHook? <a href="/signup.html" class="login-signup-link">Create an account</a>
        </p>
      </div>
    </div>

    <!-- Right: sign-in panel -->
    <div class="login-right">
      <div class="login-right-inner">
        <section class="login-card" role="region" aria-label="Sign in">
          <div id="errorBox" class="login-error" hidden></div>

          <!-- Google sign-in -->
          <a href="/auth/google" class="google-btn">
            <span class="google-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" width="18" height="18">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.08 1.53 7.48 2.81l5.1-4.9C33.44 4.59 29.17 2.5 24 2.5 14.74 2.5 6.94 7.82 3.1 15.6l6.35 4.93C11.34 14.1 17.14 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.1 24.5c0-1.34-.12-2.63-.34-3.88H24v7.34h12.5c-.54 2.9-2.18 5.35-4.64 7.02v5.8h7.5c4.38-4.03 6.74-9.97 6.74-16.28z"/>
                <path fill="#FBBC05" d="M9.45 28.53c-.47-1.4-.74-2.9-.74-4.53s.27-3.13.74-4.53l-6.35-4.93C1.77 17.23 1 20.52 1 24s.77 6.77 2.1 9.46l6.35-4.93z"/>
                <path fill="#34A853" d="M24 45.5c5.17 0 9.5-1.7 12.66-4.62l-7.5-5.8c-2.08 1.4-4.74 2.23-5.16 2.23-6.86 0-12.66-4.6-14.55-11.03l-6.35 4.93C6.94 40.18 14.74 45.5 24 45.5z"/>
                <path fill="none" d="M1 1h46v46H1z"/>
              </svg>
            </span>
            <span>Sign in with Google</span>
          </a>

          <!-- Or divider -->
          <div style="display:flex;align-items:center;gap:10px;margin:18px 0;">
            <hr style="flex:1;border:none;border-top:1px solid var(--border);margin:0;">
            <span style="font-size:12px;color:var(--text-muted);white-space:nowrap;">or</span>
            <hr style="flex:1;border:none;border-top:1px solid var(--border);margin:0;">
          </div>

          <!-- Email / password sign-in -->
          <form id="loginForm" class="login-email-form" novalidate>
            <label class="login-email-label" for="li-email">Email</label>
            <input id="li-email" type="email" class="login-email-input" placeholder="you@example.com" autocomplete="email" required />

            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:10px">
              <label class="login-email-label" for="li-password">Password</label>
              <a href="/forgot-password.html" style="font-size:12px;color:var(--brand);text-decoration:none">Forgot password?</a>
            </div>
            <input id="li-password" type="password" class="login-email-input" placeholder="Your password" autocomplete="current-password" required />

            <button type="submit" id="li-submit" class="btn-primary login-continue-btn" style="margin-top:14px;width:100%">
              Sign in
            </button>
          </form>

          <p class="login-meta" style="margin-top:12px">
            Don't have an account? <a href="/signup.html" style="color:var(--brand)">Sign up free</a>
          </p>
        </section>
      </div>
    </div>

  </div>

  <script>
  (function () {
    const errorBox = document.getElementById('errorBox');

    // URL-based errors (from OAuth or redirects)
    const params   = new URLSearchParams(window.location.search);
    const urlError = params.get('error');
    if (urlError) {
      const msg =
        urlError === 'google_not_configured'   ? 'Google sign-in is not configured on the server.' :
        urlError === 'oauth_failed'            ? 'Google sign-in failed. Please try again.' :
        urlError === 'invalid_or_expired_token' ? 'This link is invalid or has expired. Please try again.' :
        urlError === 'verification_failed'     ? 'Email verification failed. Please try again or request a new link.' :
                                                  'Sign-in error. Please try again.';
      errorBox.textContent = msg;
      errorBox.hidden = false;
    }

    function showError(msg) { errorBox.textContent = msg; errorBox.hidden = false; }
    function clearError()   { errorBox.hidden = true; }

    const ERROR_MESSAGES = {
      invalid_credentials:  'Incorrect email or password.',
      email_not_verified:   'Please verify your email before signing in. Check your inbox.',
      too_many_attempts:    'Too many failed attempts. Please wait 15 minutes before trying again.',
      login_failed:         'Sign in failed. Please try again.',
    };

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      clearError();

      const email    = document.getElementById('li-email').value.trim();
      const password = document.getElementById('li-password').value;

      if (!email)    return showError('Enter your email address.');
      if (!password) return showError('Enter your password.');

      const btn = document.getElementById('li-submit');
      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      try {
        const res  = await fetch('/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (data.ok && data.redirect) {
          window.location.href = data.redirect;
          return;
        }

        if (res.status === 429) {
          showError(ERROR_MESSAGES.too_many_attempts);
        } else {
          showError(ERROR_MESSAGES[data.error] || data.error || 'Sign in failed. Please try again.');
        }
      } catch {
        showError('Network error. Please check your connection and try again.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Sign in';
      }
    });
  })();
  </script>

</body>
</html>
