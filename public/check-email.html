<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScoutHook — Check your inbox</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/login.css" />
  <style>
    .pin-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 20px 0 24px;
    }
    .pin-digit {
      width: 44px;
      height: 52px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-heading);
      caret-color: var(--brand);
      outline: none;
      transition: border-color 0.15s;
    }
    .pin-digit:focus {
      border-color: var(--brand);
    }
    .pin-error {
      color: var(--error, #dc2626);
      font-size: 13px;
      text-align: center;
      margin: 0 0 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-split">
    <div class="login-left">
      <div class="login-left-inner">
        <img src="/images/scout-hook-logo.png" alt="ScoutHook" class="login-left-logo" />
        <h1 class="login-hero-headline" id="left-headline">Check your inbox.</h1>
      </div>
    </div>
    <div class="login-right">
      <div class="login-right-inner">
        <!-- Signup PIN entry card -->
        <section id="card-signup" class="login-card" role="region" aria-label="Enter verification code" style="display:none">
          <div style="text-align:center;margin-bottom:20px;">
            <span style="font-size:48px;line-height:1;">📬</span>
          </div>
          <h2 style="font-size:18px;font-weight:700;color:var(--text-heading);margin:0 0 8px;text-align:center">
            Check your email
          </h2>
          <p id="pin-desc" style="font-size:14px;color:var(--text-muted);text-align:center;margin:0 0 4px;line-height:1.6"></p>
          <div id="use-code-notice" style="display:none;font-size:13px;color:var(--text-muted);text-align:center;margin:0 0 8px;background:var(--surface-alt,#f9fafb);border:1px solid var(--border);border-radius:6px;padding:8px 12px;">
            Verification codes have replaced email links. Enter the 6-digit code from your email below.
          </div>

          <div class="pin-row" id="pinRow">
            <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1" />
            <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2" />
            <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3" />
            <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4" />
            <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5" />
            <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6" />
          </div>

          <p class="pin-error" id="pinError"></p>

          <button id="verifyBtn" class="btn-primary login-continue-btn" style="width:100%;margin-bottom:14px" disabled>
            Verify
          </button>

          <div style="text-align:center">
            <p style="font-size:13px;color:var(--text-muted);margin:0 0 10px">Didn't get it?</p>
            <button id="resendBtn" class="btn-secondary" style="width:100%">Resend code</button>
            <p id="resendStatus" style="font-size:12px;color:var(--text-muted);margin:10px 0 0;display:none"></p>
          </div>

          <p style="font-size:13px;color:var(--text-muted);text-align:center;margin:16px 0 0">
            <a href="/login.html" style="color:var(--brand)">Back to sign in</a>
          </p>
        </section>

        <!-- Password-reset card (unchanged) -->
        <section id="card-reset" class="login-card" role="region" aria-label="Check your inbox" style="display:none">
          <div style="text-align:center;margin-bottom:20px;">
            <span style="font-size:48px;line-height:1;">📬</span>
          </div>
          <h2 style="font-size:18px;font-weight:700;color:var(--text-heading);margin:0 0 10px;text-align:center">
            Check your inbox
          </h2>
          <p style="font-size:14px;color:var(--text-muted);text-align:center;margin:0 0 24px;line-height:1.6">
            If that email has an account, we've sent a password reset link. It expires in 1 hour.
          </p>
          <p style="font-size:13px;color:var(--text-muted);text-align:center;margin:16px 0 0">
            <a href="/login.html" style="color:var(--brand)">Back to sign in</a>
          </p>
        </section>
      </div>
    </div>
  </div>

  <script>
  (function () {
    const params  = new URLSearchParams(window.location.search);
    const reason  = params.get('reason');
    const email   = params.get('email') || '';
    const info    = params.get('info')  || '';

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    if (reason === 'reset') {
      document.getElementById('card-reset').style.display = '';
      return; // nothing else to do
    }

    // ── Signup PIN flow ────────────────────────────────────────────────────────
    document.getElementById('card-signup').style.display = '';

    const desc = document.getElementById('pin-desc');
    desc.innerHTML = email
      ? 'We sent a 6-digit code to <strong>' + escapeHtml(email) + '</strong>. Enter it below to activate your account.'
      : 'Enter the 6-digit code we sent to your email address.';

    if (info === 'use_code') {
      document.getElementById('use-code-notice').style.display = '';
    }

    // ── PIN inputs ─────────────────────────────────────────────────────────────
    const digits    = Array.from(document.querySelectorAll('.pin-digit'));
    const verifyBtn = document.getElementById('verifyBtn');
    const pinError  = document.getElementById('pinError');

    function getPin() { return digits.map(d => d.value).join(''); }
    function updateBtn() { verifyBtn.disabled = getPin().length < 6; }
    function showError(msg) { pinError.textContent = msg; pinError.style.display = ''; }
    function clearError()   { pinError.style.display = 'none'; }

    digits.forEach((input, i) => {
      input.addEventListener('input', e => {
        clearError();
        // Allow only digits; strip non-numeric silently
        input.value = input.value.replace(/\D/g, '').slice(0, 1);
        if (input.value && i < digits.length - 1) digits[i + 1].focus();
        updateBtn();
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !input.value && i > 0) {
          digits[i - 1].focus();
        }
        if (e.key === 'ArrowLeft'  && i > 0)                digits[i - 1].focus();
        if (e.key === 'ArrowRight' && i < digits.length - 1) digits[i + 1].focus();
      });

      // Paste handler — distribute digits across boxes
      input.addEventListener('paste', e => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData)
          .getData('text').replace(/\D/g, '').slice(0, 6);
        pasted.split('').forEach((ch, j) => {
          if (digits[i + j]) digits[i + j].value = ch;
        });
        const next = Math.min(i + pasted.length, digits.length - 1);
        digits[next].focus();
        clearError();
        updateBtn();
      });
    });

    // ── Verify button ──────────────────────────────────────────────────────────
    verifyBtn.addEventListener('click', async () => {
      const pin = getPin();
      if (pin.length < 6) return;

      verifyBtn.disabled    = true;
      verifyBtn.textContent = 'Verifying…';
      clearError();

      try {
        const res  = await fetch('/auth/verify-email', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, pin }),
        });
        const data = await res.json();
        if (data.ok && data.redirect) {
          window.location.href = data.redirect;
        } else {
          const msg =
            data.error === 'invalid_or_expired_code' ? 'Incorrect or expired code — please try again or resend.' :
            data.error === 'invalid_request'         ? 'Please enter all 6 digits.' :
                                                       'Something went wrong. Please try again.';
          showError(msg);
          verifyBtn.disabled    = false;
          verifyBtn.textContent = 'Verify';
        }
      } catch {
        showError('Network error — please try again.');
        verifyBtn.disabled    = false;
        verifyBtn.textContent = 'Verify';
      }
    });

    // ── Resend button ──────────────────────────────────────────────────────────
    const resendBtn    = document.getElementById('resendBtn');
    const resendStatus = document.getElementById('resendStatus');

    resendBtn.addEventListener('click', async () => {
      resendBtn.disabled    = true;
      resendBtn.textContent = 'Sending…';
      try {
        await fetch('/auth/resend-verification', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email }),
        });
        resendStatus.textContent = 'Sent! Check your inbox (and spam folder).';
        resendStatus.style.display = '';
      } catch {
        resendStatus.textContent = 'Something went wrong. Please try again.';
        resendStatus.style.display = '';
      } finally {
        resendBtn.disabled    = false;
        resendBtn.textContent = 'Resend code';
      }
    });

    // Focus first digit on load
    digits[0].focus();
  })();
  </script>
</body>
</html>
